function updateActivePowerDisplay() {
  const el = document.getElementById("active-power-display");
  const parts = [];
  if (state.hasShield) parts.push("Shield x" + state.shieldCharges);
  if (parts.length > 0) {
    el.textContent = parts.join("  ");
    el.style.display = "flex";
  } else {
    el.style.display = "none";
  }
}

function handleBattleAnswer(chosenVal) {
  if (state.battleAnswerLocked || state.phase !== "battle") return;
  state.battleAnswerLocked = true;
  state.questionPending = false;
  stopBattleTimer();

  const q = state.currentQ;
  const correct = q.a * q.b;
  const elapsed = (Date.now() - state.timerStart) / 1000;
  const isCorrect = (chosenVal !== null && parseInt(chosenVal) === correct);

  // Highlight buttons
  for (let i=0; i<4; i++) {
    const btn = document.getElementById("btn"+i);
    if (!btn || btn.dataset.mode !== "battle") continue;
    const val = parseInt(btn.dataset.val);
    if (val === correct) btn.classList.add("correct");
    else if (chosenVal !== null && val === parseInt(chosenVal)) btn.classList.add("wrong");
  }

  if (isCorrect) {
    state.battleCorrectCount++;
    if (elapsed < state.battleFastestAnswer) state.battleFastestAnswer = elapsed;
    state.levelScore += 80;

    // Brief "correct" flash, then show superpower picker
    triggerFlash("rgba(0,255,180,0.35)", 150);
    spawnFloatText("CORRECT! CHOOSE POWER!", W*0.5, H*0.38, "#00ffcc", 18);

    setTimeout(function() {
      if (state.phase !== "battle") return;
      document.getElementById("question-area").style.display = "none";
      showSuperpowerChoice();
    }, 600);

  } else {
    // Wrong / timeout — BIG boss attack: 2 damage, heavy shake
    state.battleWrongCount++;
    state.noDamageTaken = false;

    // Show correct answer highlighted for 1 second (learning moment)
    if (chosenVal === null) spawnFloatText("TIME! = " + correct, W*0.5, H*0.4, "#ff6666", 22);
    else spawnFloatText("WRONG! = " + correct, W*0.5, H*0.4, "#ff4444", 22);

    setTimeout(function() {
      if (state.phase !== "battle") return;
      document.getElementById("question-area").style.display = "none";

      // Check shield charges
      if (state.shieldCharges > 0) {
        state.shieldCharges -= Math.min(2, state.shieldCharges); // big attack drains 2 charges (or all)
        if (state.shieldCharges <= 0) {
          state.hasShield = false;
          updateActivePowerDisplay();
        }
        const shCX = state.angelX + 48*3*0.5;
        const shCY = state.angelY + 64*3*0.5;
        const shR  = 64*3*0.65;
        triggerFlash("rgba(255,215,0,0.9)", 120);
        triggerShake(6);
        addEffect("shieldShatterRing", { cx: shCX, cy: shCY }, 600);
        const shatSeed = Math.random() * 100;
        for (let fi = 0; fi < 18; fi++) {
          addEffect("shieldShatter", {
            cx: shCX, cy: shCY, r: shR,
            fragIdx: fi, seed: shatSeed
          }, 700 + Math.random() * 200);
        }
        spawnParticleBurst(shCX, shCY, 40, "#ffd700", 7, 3);
        spawnParticleBurst(shCX, shCY, 15, "#fffacd", 5, 2);
        spawnFloatText("SHIELD SHATTERED!", W*0.3, H*0.38, "#ffd700", 20);
        sfxAttackHit();
      } else {
        // BIG attack: 2 damage
        sfxDevilAttack();
        state.angelHP = Math.max(0, state.angelHP - 2);
        state.angelFlash = 8;
        state.angelKnockback = 16;
        triggerShake(7);

        const isKrakenBig = (state.currentLevel === 2);
        const bossWBig = isKrakenBig ? 96*1.4 : 48*3;
        spawnBossAttack(
          state.currentLevel,
          state.angelX + 48*3*0.5, state.angelY + 64*1.5,
          state.bossX + bossWBig*0.5, state.bossY + (isKrakenBig?128*1.4:64*3)*0.5
        );
        // Extra dramatic second hit
        setTimeout(function() {
          if (state.phase !== "battle") return;
          spawnBossAttack(
            state.currentLevel,
            state.angelX + 48*3*0.5, state.angelY + 64*1.5,
            state.bossX + bossWBig*0.5, state.bossY + (isKrakenBig?128*1.4:64*3)*0.5
          );
          triggerShake(5);
        }, 300);

        spawnFloatText("BIG HIT! -2", W*0.28, H*0.33, "#ff2222", 22);
        updateBattleHUD();
      }

      if (state.angelHP <= 0) {
        state.angelHP = 0;
        updateBattleHUD();
        setTimeout(function() { battleDefeat(); }, 800);
        return;
      }

      // Schedule next question after resolution
      scheduleNextQuestion();
    }, 1200);
  }
}

function nextBattleQuestion() {
  if (state.phase !== "battle") return;
  document.getElementById("question-area").style.display = "none";
  for (let i=0; i<4; i++) {
    const btn = document.getElementById("btn"+i);
    if (btn) { btn.className = "answer-btn"; btn.dataset.mode = ""; }
  }
  setTimeout(function() { showBattleQuestion(); }, 200);
}

// ============================================================
// PHASE: VICTORY
// ============================================================
function battleVictory() {
  if (state.phase === "victory" || state.phase === "defeat") return; // guard double-trigger
  state.phase = "victory";
  clearBattleTimers();
  hideAllOverlays();

  sfxVictory();
  triggerFlash("rgba(255,215,0,0.5)", 300);

  // Boss dissolve particles
  const lvl = state.currentLevel;
  const isKraken = (lvl === 2);
  const bossW = isKraken ? 96*1.4 : 48*3;
  const bossH = isKraken ? 128*1.4 : 64*3;
  const bossColors = [
    ["#6600cc","#aa00ff"],["#88ccff","#aaeeff"],["#2266aa","#44aaff"],
    ["#ff4400","#ff8800"],["#8800cc","#ff00aa"]
  ][lvl];
  for (let i=0; i<60; i++) {
    spawnParticleBurst(state.bossX+bossW*0.5, state.bossY+bossH*0.5, 1, bossColors[Math.floor(Math.random()*bossColors.length)], 6, 4);
  }
  state.bossDefeated = true;
  state.bossDefeatedTimer = 0;

  state.levelsCompleted[lvl] = true;

  // Carry over 50% of power bar to next level
  state.powerBarCarryOver = Math.round(state.powerBar * 0.5);

  // Compute bonuses
  const mult = LEVEL_MULTIPLIER[lvl];
  const base = state.levelScore;
  let bonuses = 0;
  const bonusLines = [];
  if (state.noDamageTaken) { bonuses += 500; bonusLines.push("No Damage Taken: +500"); }
  if (state.perfectTraining) { bonuses += 300; bonusLines.push("Perfect Training: +300"); }
  if (state.trainingAvgTime < 4) { bonuses += 200; bonusLines.push("Avg Speed < 4s: +200"); }
  const multiplied = Math.round((base + bonuses) * mult);
  state.totalScore += multiplied;
  state.levelScore = 0;

  const acc = state.battleTotalAsked > 0 ? Math.round(state.battleCorrectCount / state.battleTotalAsked * 100) : 0;
  const fastest = state.battleFastestAnswer < 99 ? state.battleFastestAnswer.toFixed(1)+"s" : "--";

  setTimeout(function() {
    if (lvl === 4) {
      showCampaignComplete();
      return;
    }
    const el = document.getElementById("outcome-overlay");
    el.style.display = "flex";
    const titleEl = document.getElementById("outcome-title");
    titleEl.textContent = "VICTORY!";
    titleEl.style.color = "#ffd700";
    document.getElementById("outcome-sub").textContent = LEVEL_CONFIG[lvl].boss + " has been defeated!";
    document.getElementById("defeat-progress-wrap").style.display = "none";
    document.getElementById("outcome-stats").innerHTML =
      "Shots Fired: "+state.totalShotsFired+"  |  Fastest Answer: "+fastest+"<br>Questions Correct: "+state.battleCorrectCount+"/"+state.battleTotalAsked+"  ("+acc+"% accuracy)";
    let breakdown = "Base Score: "+base.toLocaleString();
    if (bonusLines.length) breakdown += "<br>" + bonusLines.join("<br>");
    breakdown += "<br>Level Multiplier: ×" + mult.toFixed(1);
    breakdown += "<br><strong>TOTAL ADDED: +" + multiplied.toLocaleString() + "</strong>";
    document.getElementById("outcome-score-breakdown").innerHTML = breakdown;
    const btn = document.getElementById("outcome-btn");
    btn.textContent = lvl < 4 ? "NEXT LEVEL" : "CAMPAIGN COMPLETE";
    btn.onclick = function() {
      document.getElementById("outcome-overlay").style.display = "none";
      showLevelIntro(lvl + 1);
    };
    updateProgressDots();
  }, 1800);
}

// ============================================================
// PHASE: DEFEAT
// ============================================================
function battleDefeat() {
  if (state.phase === "victory" || state.phase === "defeat") return; // guard double-trigger
  state.phase = "defeat";
  clearBattleTimers();
  hideAllOverlays();

  sfxDefeat();

  // Angel kneels (south-facing, dim)
  state.angelFlash = 0;

  const lvl = state.currentLevel;
  const bossMaxHP = state.bossInitialHP;
  const damagePct = Math.max(0, Math.round((1 - state.bossHP/bossMaxHP)*100));

  setTimeout(function() {
    const el = document.getElementById("outcome-overlay");
    el.style.display = "flex";
    const titleEl = document.getElementById("outcome-title");
    titleEl.textContent = "DEFEATED...";
    titleEl.style.color = "#ff4444";
    document.getElementById("outcome-sub").textContent =
      "You dealt "+damagePct+"% damage to "+LEVEL_CONFIG[lvl].boss+"!";
    const pw = document.getElementById("defeat-progress-wrap");
    pw.style.display = "block";
    setTimeout(function() {
      document.getElementById("defeat-progress-fill").style.width = damagePct+"%";
    }, 100);
    document.getElementById("outcome-stats").innerHTML =
      "Shots Fired: "+state.totalShotsFired+"  |  Accuracy: "+(state.battleTotalAsked > 0 ? Math.round(state.battleCorrectCount/state.battleTotalAsked*100) : 0)+"%";
    document.getElementById("outcome-score-breakdown").innerHTML = "";
    const btn = document.getElementById("outcome-btn");
    btn.textContent = "RETRY";
    btn.onclick = function() {
      document.getElementById("outcome-overlay").style.display = "none";
      state.levelScore = 0;
      state.powerBarCarryOver = 0; // No carry-over on retry
      showLevelIntro(lvl);
    };
  }, 1200);
}

// ============================================================
// PHASE: CAMPAIGN COMPLETE
// ============================================================
function showCampaignComplete() {
  state.phase = "campaign-complete";
  hideAllOverlays();

  // Golden particle celebration
  for (let i=0; i<100; i++) {
    setTimeout(function() {
      spawnParticleBurst(Math.random()*W, Math.random()*H*0.7, 5, "#ffd700", 6, 4);
    }, i*80);
  }

  sfxVictory();
  setTimeout(sfxVictory, 1000);

  const el = document.getElementById("campaign-overlay");
  el.style.display = "flex";
  document.getElementById("campaign-score").textContent = "Total Score: "+state.totalScore.toLocaleString();
  document.getElementById("campaign-credits").innerHTML =
    "Character Art:<br>"+
    "Jordan Irwin (AntumDeluge) · Svetlana Kushnariova (Cabbit)<br>"+
    "Stephen Challener (Redshrike) · William Thompson · Lanea Zimmerman<br>"+
    "Diligent Dodo (soniccuz)<br>"+
    "Licences: CC-BY 3.0/4.0 · OGA-BY 3.0 · CC-BY-SA 3.0";
  document.getElementById("play-again-btn").onclick = function() {
    state.totalScore = 0;
    state.levelsCompleted = [false,false,false,false,false];
    el.style.display = "none";
    showTitle();
  };
  updateProgressDots();
}

// ============================================================
// MAIN RENDER LOOP
// ============================================================
let lastTime = 0;

function renderBg() {
  const lvl = state.currentLevel;
  const bg = bgCache[lvl];
  if (bg) {
    ctx.drawImage(bg, 0, 0);
  } else {
    ctx.fillStyle = "#0a0a1e";
    ctx.fillRect(0, 0, W, H);
  }
}

function renderTitle() {
  renderBg();
  updateAmbients(0);
  drawAmbients();

  // Animated angel on title
  const scale = 3;
  const ax = W*0.5 - 48*scale/2;
  const ay = H*0.12 + angelBobOffset;
  drawAngel(ax, ay, scale, 3, angelFrame); // Show archangel on title
}

function renderLevelIntro() {
  renderBg();
  updateAmbients(state.currentLevel);
  drawAmbients();

  // Boss silhouette preview — position right side, scale to fit ~180px tall
  const level = state.currentLevel;
  // Kraken is 128px/frame, others 64px/frame. Target height ~180px.
  const isKraken = (level === 2);
  const bossScale = isKraken ? 1.4 : 3;
  const bossW = isKraken ? 96*bossScale : 48*bossScale;
  const bossH = isKraken ? 128*bossScale : 64*bossScale;
  const bx2 = W*0.72 - bossW*0.5;
  const by2 = H*0.15 + (H*0.65 - bossH)*0.5 + bossBobOffset;  // vertically centered in upper 65%
  ctx.save(); ctx.globalAlpha = 0.55;
  drawBossOnCanvas(level, bx2, by2, bossScale);
  ctx.restore();

  // Angel (stage 0) left side
  const angelScale = 3;
  const ax = W*0.12;
  const ay = H*0.28 + angelBobOffset;
  drawAngel(ax, ay, angelScale, 0, angelFrame);
}

function renderTraining() {
  renderBg();
  updateAmbients(state.currentLevel);
  drawAmbients();

  // Angel — center-left, clear of power bar (x=14,w=18) and HUD (top ~52px) and question area
  const scale = 3.5;
  const angelW = 48 * scale;  // 168px
  const angelH = 64 * scale;  // 224px
  const ax = 50;  // just right of power bar
  // Vertically: clamp between HUD bottom (55px) and question area top (~370px)
  const topPad = 55, botPad = H - 125;
  const ay = Math.max(topPad, topPad + (botPad - topPad - angelH) * 0.4) + angelBobOffset;
  // Evolution transition rendering
  if (state.evolutionActive) {
    if (state.evolutionFlash === 0) {
      // Pre-flash: old sprite fading out
      state.evolutionFadeOut = Math.max(0, state.evolutionFadeOut - 0.05);
      if (state.evolutionFadeOut > 0) {
        ctx.save(); ctx.globalAlpha = state.evolutionFadeOut;
        drawAngel(ax, ay, scale, state.evolutionOldStage, angelFrame);
        ctx.restore();
      }
      // Also start fading in new sprite gently
      if (state.evolutionFadeOut < 0.3) {
        const eIn = Math.min(1, (0.3 - state.evolutionFadeOut) / 0.3);
        ctx.save(); ctx.globalAlpha = eIn * 0.5;
        drawAngel(ax, ay, scale, state.evolutionNewStage, angelFrame);
        ctx.restore();
      }
    } else {
      // Post-flash: new sprite fading in
      state.evolutionFadeIn = Math.min(1, state.evolutionFadeIn + 0.05);
      ctx.save(); ctx.globalAlpha = state.evolutionFadeIn;
      drawAngel(ax, ay, scale, state.evolutionNewStage, angelFrame);
      ctx.restore();
    }
  } else {
    drawAngel(ax, ay, scale, state.angelStage, angelFrame);
  }

  // Evolution text — scales up and fades
  if (state.evolutionTextAlpha > 0 && state.evolutionTextStr) {
    state.evolutionTextScale = Math.min(1.8, state.evolutionTextScale + 0.08);
    if (state.evolutionTextScale >= 1.8) {
      state.evolutionTextAlpha = Math.max(0, state.evolutionTextAlpha - 0.015);
    }
    const evStage = state.evolutionNewStage;
    const evColor = ["#888888","#aaaaff","#88ccff","#ffd700","#ffaa00"][evStage] || "#ffd700";
    const evSize = Math.round(22 * state.evolutionTextScale);
    ctx.save();
    ctx.globalAlpha = state.evolutionTextAlpha;
    ctx.font = `bold ${evSize}px Segoe UI`;
    ctx.textAlign = "center";
    ctx.fillStyle = evColor;
    ctx.shadowColor = evColor; ctx.shadowBlur = 20;
    ctx.fillText(state.evolutionTextStr, ax + angelW*0.5, ay - 20);
    ctx.shadowBlur = 0;
    ctx.restore();
  }

  // Stage name below angel
  const stageCol = ["#888888","#aaaaff","#88ccff","#ffd700","#ffaa00"][state.angelStage];
  ctx.save();
  ctx.fillStyle = stageCol;
  ctx.font = "bold 12px Segoe UI";
  ctx.textAlign = "center";
  ctx.shadowColor = stageCol; ctx.shadowBlur = 8;
  const labelY = ay + angelH + 14;
  if (labelY < H - 115) {
    ctx.fillText(STAGE_NAMES[state.angelStage], ax + angelW * 0.5, labelY);
  }
  ctx.restore();

  // Question count (top right, below score HUD)
  ctx.save();
  ctx.fillStyle = "rgba(255,255,255,0.5)";
  ctx.font = "12px Segoe UI";
  ctx.textAlign = "right";
  ctx.fillText(state.questionsAnswered + "/" + LEVEL_CONFIG[state.currentLevel].trainQ, W - 14, 38);
  ctx.restore();

  updateParticles();
  drawParticles();
}

function renderBattle() {
  renderBg();
  // Darken for battle atmosphere
  ctx.save();
  ctx.fillStyle = "rgba(0,0,0,0.3)";
  ctx.fillRect(0,0,W,H);
  ctx.restore();

  updateAmbients(state.currentLevel);
  drawAmbients();

  const lvl = state.currentLevel;
  const isKraken = (lvl === 2);
  const angelScale = 3;
  const bossScale = isKraken ? 1.4 : 3;
  const bossW = isKraken ? 96*bossScale : 48*bossScale;
  const bossH = isKraken ? 128*bossScale : 64*bossScale;

  // Boss entrance animation — unique per boss
  let drawBossX = state.bossX;
  let drawBossY = state.bossY;
  let drawBossAlpha = 1;
  let drawEntranceTrail = false;
  if (state.bossEntrancePhase === 1) {
    state.entranceTick = (state.entranceTick || 0) + 1;
    const ENTRANCE_DURATION = 55; // ticks
    const t = Math.min(1, state.entranceTick / ENTRANCE_DURATION);
    const ease = 1 - Math.pow(1-t, 3);
    switch(lvl) {
      case 0: {
        // Shadow Wolf: slides in fast from right with shadow trail
        drawBossX = (W + bossW) + (state.bossX - (W + bossW)) * ease;
        drawEntranceTrail = true;
        // Spawn shadow trail particles
        if (state.entranceTick % 2 === 0 && t < 1) {
          for (let st2=0; st2<3; st2++) {
            particles.push({
              x: drawBossX + bossW*0.5 + (Math.random()-0.5)*20,
              y: state.bossY + bossH*0.5 + (Math.random()-0.5)*30,
              vx: 2+Math.random()*2, vy: (Math.random()-0.5)*1,
              life:1, decay:0.07, r:4+Math.random()*6,
              color:"#6600cc", alpha:0.6
            });
          }
        }
        break;
      }
      case 1: {
        // Frost Witch: floats down from above with ice sparkles
        const startY = -bossH - 20;
        drawBossY = startY + (state.bossY - startY) * ease;
        drawBossAlpha = 0.3 + 0.7 * t;
        if (state.entranceTick % 3 === 0 && t < 1) {
          for (let si=0; si<4; si++) {
            particles.push({
              x: state.bossX + Math.random()*bossW,
              y: drawBossY + Math.random()*bossH,
              vx: (Math.random()-0.5)*1.5, vy: 0.5+Math.random(),
              life:1, decay:0.04, r:1.5+Math.random()*2,
              color: Math.random()<0.5 ? "#aaeeff" : "#88ccff", alpha:1
            });
          }
        }
        break;
      }
      case 2: {
        // Kraken Lord: tentacles rise from bottom, then sprite slides up
        if (t < 0.5) {
          // Tentacles rising phase — draw tentacles, boss off-screen below
          drawBossY = H + bossH;
          // Tentacles are drawn as thick lines rising from bottom
          const tPhase = t / 0.5; // 0-1 over first half
          ctx.save();
          ctx.strokeStyle = "#2266aa";
          ctx.lineWidth = 8;
          ctx.shadowColor = "#44aaff"; ctx.shadowBlur = 15;
          ctx.globalAlpha = 0.7;
          const tentacleX = [state.bossX + bossW*0.15, state.bossX + bossW*0.4, state.bossX + bossW*0.65, state.bossX + bossW*0.9];
          tentacleX.forEach(function(tx2, ti) {
            const tentLen = Math.max(10, H * tPhase * 0.85);
            const waveOffset = Math.sin(Date.now()*0.005 + ti) * 15;
            ctx.beginPath();
            ctx.moveTo(tx2, H);
            ctx.quadraticCurveTo(tx2 + waveOffset, H - tentLen*0.5, tx2 - waveOffset*0.5, H - tentLen);
            ctx.stroke();
          });
          ctx.restore();
        } else {
          // Slide up phase
          const tUp = (t - 0.5) / 0.5;
          const easeUp = 1 - Math.pow(1-tUp, 3);
          drawBossY = (H + bossH) + (state.bossY - (H + bossH)) * easeUp;
        }
        break;
      }
      case 3: {
        // Devil Queen: fire erupts at boss position, then sprite fades in
        if (t < 0.55) {
          drawBossAlpha = 0;
          // Fire particle eruption
          if (state.entranceTick % 2 === 0) {
            for (let fi=0; fi<5; fi++) {
              particles.push({
                x: state.bossX + bossW*0.5 + (Math.random()-0.5)*bossW*0.8,
                y: state.bossY + bossH*0.8 + Math.random()*20,
                vx: (Math.random()-0.5)*3, vy: -(2+Math.random()*4),
                life:1, decay:0.025+Math.random()*0.02,
                r:3+Math.random()*5,
                color: Math.random()<0.5 ? "#ff4400" : "#ff8800", alpha:1
              });
            }
          }
        } else {
          // Fade in
          drawBossAlpha = (t - 0.55) / 0.45;
        }
        break;
      }
      case 4: {
        // Violet Avenger: dark energy motes converge, sprite materializes
        if (t < 0.6) {
          drawBossAlpha = 0;
          // Motes converging inward
          if (state.entranceTick % 2 === 0) {
            const angle = Math.random()*Math.PI*2;
            const dist = 100 + Math.random()*150;
            particles.push({
              x: state.bossX + bossW*0.5 + Math.cos(angle)*dist,
              y: state.bossY + bossH*0.5 + Math.sin(angle)*dist,
              vx: -Math.cos(angle)*(2+Math.random()*2),
              vy: -Math.sin(angle)*(2+Math.random()*2),
              life:1, decay:0.025+Math.random()*0.02,
              r:2.5+Math.random()*3.5,
              color: Math.random()<0.5 ? "#8800cc" : "#ff00aa", alpha:1
            });
          }
        } else {
          // Materialize with shimmer
          drawBossAlpha = Math.min(1, (t - 0.6) / 0.4);
        }
        break;
      }
    }
    if (t >= 1) state.bossEntrancePhase = 2;
  }
  if (state.bossEntrancePhase === 0) {
    // Not yet entered — don't draw
  }

  // Angel X with knockback
  const ax = state.angelX + angelBobOffset*0 + (state.angelKnockback > 0 ? -state.angelKnockback : 0);
  const ay = state.angelY + angelBobOffset - (state.angelRise || 0);

  // Boss with knockback
  const bx2 = drawBossX + (state.bossKnockback > 0 ? state.bossKnockback : 0);
  const by2 = drawBossY + bossBobOffset;

  // Decay knockback
  if (state.angelKnockback > 0) state.angelKnockback = Math.max(0, state.angelKnockback - 1.5);
  if (state.bossKnockback > 0)  state.bossKnockback  = Math.max(0, state.bossKnockback  - 1.5);
  if (state.angelRise > 0)      state.angelRise       = Math.max(0, state.angelRise      - 0.8);

  // Draw angel (east-facing = row 1 in sprite, but use same drawAngel which uses row 2)
  // Use row 1 (west direction) for battle — angel faces right toward boss
  if (state.phase === "battle" || state.phase === "victory" || state.phase === "defeat") {
    // Draw angel
    const angelAlpha = state.phase === "defeat" ? 0.3 : 1.0;
    const aFlash = state.angelFlash > 0;
    if (aFlash) {
      ctx.save(); ctx.filter = "brightness(3)";
      drawAngel(ax, ay, angelScale, state.angelStage, angelFrame);
      ctx.restore();
      state.angelFlash--;
    } else {
      ctx.globalAlpha = angelAlpha;
      drawAngel(ax, ay, angelScale, state.angelStage, angelFrame);
      ctx.globalAlpha = 1.0;
    }

    // Draw fire aura if Wings of Fire active
    if (state.activeSuperPower === "fire") {
      const faCX = ax + 48*angelScale*0.5;
      const faCY = ay + 64*angelScale*0.5;
      const now_fa = Date.now();
      const pulse_fa = 0.7 + 0.3 * Math.sin(now_fa * 0.008);
      // Outer glow
      ctx.save();
      const faGrd = ctx.createRadialGradient(faCX, faCY, 30, faCX, faCY, 120 * pulse_fa);
      faGrd.addColorStop(0, "rgba(255,140,0,0)");
      faGrd.addColorStop(0.4, "rgba(255,80,0," + (0.22 * pulse_fa).toFixed(3) + ")");
      faGrd.addColorStop(0.75, "rgba(180,30,0," + (0.12 * pulse_fa).toFixed(3) + ")");
      faGrd.addColorStop(1, "rgba(80,0,0,0)");
      ctx.fillStyle = faGrd;
      ctx.fillRect(faCX - 130, faCY - 130, 260, 260);
      ctx.restore();
      // Continuous small fire particle streams from wing positions (every few frames)
      if (Math.random() < 0.6) {
        const wingLX = ax + 20;
        const wingRX = ax + 48*angelScale - 20;
        const wingY  = ay + 64*angelScale*0.35;
        for (let side of [wingLX, wingRX]) {
          particles.push({
            x: side + (Math.random()-0.5)*20,
            y: wingY + (Math.random()-0.5)*15,
            vx: (Math.random()-0.5)*1.5,
            vy: -(1.5+Math.random()*2.5),
            life:1, decay:0.03+Math.random()*0.03,
            r:2+Math.random()*3.5,
            color: Math.random()<0.5?"#ff4400":"#ff8800", alpha:0.85,
            glow:"#ff4400"
          });
        }
      }
    }

    // Draw shield dome if active (animated, with hex facets and orbit sparks)
    if (state.hasShield) {
      const sdCX = ax + 48*angelScale*0.5;
      const sdCY = ay + 64*angelScale*0.5;
      const sdR  = 64*angelScale*0.65;
      const now_sd = Date.now();
      const pulse_sd = 0.65 + 0.35 * Math.sin(now_sd * 0.004);

      ctx.save();
      // Semi-transparent dome fill
      const domeGrd = ctx.createRadialGradient(sdCX, sdCY - sdR*0.2, 0, sdCX, sdCY, sdR);
      domeGrd.addColorStop(0, "rgba(255,240,120,0)");
      domeGrd.addColorStop(0.55, "rgba(255,215,0," + (0.10 * pulse_sd).toFixed(3) + ")");
      domeGrd.addColorStop(0.85, "rgba(255,180,0," + (0.18 * pulse_sd).toFixed(3) + ")");
      domeGrd.addColorStop(1,   "rgba(255,140,0,0)");
      ctx.fillStyle = domeGrd;
      ctx.beginPath(); ctx.arc(sdCX, sdCY, sdR, 0, Math.PI*2); ctx.fill();

      // Outer ring stroke — pulsing brightness
      const rimAlpha = 0.5 + 0.5 * pulse_sd;
      ctx.strokeStyle = "rgba(255,215,0," + rimAlpha.toFixed(2) + ")";
      ctx.lineWidth = 3;
      ctx.shadowColor = "#ffd700"; ctx.shadowBlur = 22;
      ctx.beginPath(); ctx.arc(sdCX, sdCY, sdR, 0, Math.PI*2); ctx.stroke();
      // Inner subtle ring
      ctx.globalAlpha = 0.4 * pulse_sd;
      ctx.lineWidth = 1.5;
      ctx.shadowBlur = 8;
      ctx.beginPath(); ctx.arc(sdCX, sdCY, sdR * 0.78, 0, Math.PI*2); ctx.stroke();

      // Hexagonal facet lines
      ctx.globalAlpha = 0.35 * pulse_sd;
      ctx.strokeStyle = "rgba(255,220,80,0.8)";
      ctx.lineWidth = 0.8;
      ctx.shadowBlur = 4;
      const hexSize2 = sdR * 0.28;
      const hexCenters2 = [
        [0, 0], [sdR*0.48, 0], [-sdR*0.48, 0],
        [sdR*0.24, -sdR*0.41], [-sdR*0.24, -sdR*0.41],
        [sdR*0.24, sdR*0.41],  [-sdR*0.24, sdR*0.41]
      ];
      const hexRot = now_sd * 0.0003;
      for (const [hcx, hcy] of hexCenters2) {
        const dist2 = Math.sqrt(hcx*hcx + hcy*hcy);
        if (dist2 + hexSize2 > sdR * 0.95) continue;
        ctx.beginPath();
        for (let hv = 0; hv < 6; hv++) {
          const ha = (hv / 6) * Math.PI * 2 + hexRot;
          const hx2 = sdCX + hcx + Math.cos(ha) * hexSize2;
          const hy2 = sdCY + hcy + Math.sin(ha) * hexSize2;
          if (hv === 0) ctx.moveTo(hx2, hy2); else ctx.lineTo(hx2, hy2);
        }
        ctx.closePath(); ctx.stroke();
      }

      // Outer glow halo
      ctx.globalAlpha = 0.25 * pulse_sd;
      const haloGrd = ctx.createRadialGradient(sdCX, sdCY, sdR*0.85, sdCX, sdCY, sdR*1.25);
      haloGrd.addColorStop(0, "rgba(255,215,0,0.4)");
      haloGrd.addColorStop(1, "rgba(255,180,0,0)");
      ctx.fillStyle = haloGrd;
      ctx.beginPath(); ctx.arc(sdCX, sdCY, sdR*1.25, 0, Math.PI*2); ctx.fill();

      ctx.restore();

      // Orbiting spark particles spawned occasionally
      if (Math.random() < 0.35) {
        const orbitAngle = Math.random() * Math.PI * 2;
        addEffect("shieldOrbitSpark", {
          cx: sdCX, cy: sdCY, r: sdR, angle: orbitAngle
        }, 800 + Math.random() * 400);
      }
    }
  }

  // Draw boss (if entered and not fully defeated)
  if (state.bossEntrancePhase >= 1 && !state.bossDefeated) {
    const bFlash = state.bossFlash > 0;
    if (bFlash) {
      ctx.save(); ctx.filter = "brightness(4)";
      ctx.globalAlpha = drawBossAlpha;
      drawBossOnCanvas(lvl, bx2, by2, bossScale);
      ctx.restore();
      state.bossFlash--;
    } else {
      ctx.save(); ctx.globalAlpha = drawBossAlpha;
      drawBossOnCanvas(lvl, bx2, by2, bossScale);
      ctx.restore();
    }
  } else if (state.bossDefeated) {
    // Boss dissolving
    state.bossDefeatedTimer = (state.bossDefeatedTimer||0)+1;
    const dissolveT = Math.min(1, state.bossDefeatedTimer/60);
    if (dissolveT < 1) {
      ctx.save();
      ctx.globalAlpha = 1-dissolveT;
      const sc = bossScale * (1 - dissolveT*0.5);
      const offX = bx2 + bossW*(bossScale - sc)*0.5/bossScale;
      ctx.translate(bx2+bossW*0.5, by2+bossH*0.5);
      ctx.rotate(dissolveT*Math.PI*2);
      ctx.scale(1-dissolveT*0.5, 1-dissolveT*0.5);
      ctx.translate(-bossW*0.5, -bossH*0.5);
      drawBossOnCanvas(lvl, 0, 0, bossScale);
      ctx.restore();
    }
  }

  updateParticles();
  drawParticles();
  renderEffects();
}

function renderVictory() {
  renderBg();
  ctx.save(); ctx.fillStyle="rgba(0,0,0,0.35)"; ctx.fillRect(0,0,W,H); ctx.restore();
  updateAmbients(state.currentLevel);
  drawAmbients();
  // Angel still visible in victory pose
  drawAngel(state.angelX, state.angelY + angelBobOffset, 3, state.angelStage, angelFrame);
  updateParticles(); drawParticles();
}

function renderDefeat() {
  renderBg();
  ctx.save(); ctx.fillStyle="rgba(0,0,0,0.55)"; ctx.fillRect(0,0,W,H); ctx.restore();
  drawAmbients();
  // Angel kneels (south-facing row 0/2, dimmed)
  ctx.save(); ctx.globalAlpha = 0.3;
  drawAngel(state.angelX, state.angelY, 3, state.angelStage, 0);
  ctx.restore();
  // Boss still stands on right
  const lvl = state.currentLevel;
  const isKraken = (lvl === 2);
  const bossScale = isKraken ? 1.4 : 3;
  drawBossOnCanvas(lvl, state.bossX, state.bossY, bossScale);
  updateParticles(); drawParticles();
}

function renderCampaignComplete() {
  renderBg();
  ctx.save(); ctx.fillStyle="rgba(0,0,20,0.7)"; ctx.fillRect(0,0,W,H); ctx.restore();
  // Golden particles everywhere
  updateParticles(); drawParticles();
  if (Math.random()<0.15) spawnParticleBurst(Math.random()*W, Math.random()*H*0.7, 3, "#ffd700", 5, 3);
}

function gameLoop(timestamp) {
  requestAnimationFrame(gameLoop);
  updateAngelAnim();
  updateBossAnim();
  applyShake();

  ctx.clearRect(0, 0, W, H);

  switch(state.phase) {
    case "title":            renderTitle();           break;
    case "level-intro":      renderLevelIntro();      break;
    case "training":         renderTraining();        break;
    case "battle":           renderBattle();          break;
    case "victory":          renderVictory();         break;
    case "defeat":           renderDefeat();          break;
    case "campaign-complete":renderCampaignComplete(); break;
    default:                 renderTitle();           break;
  }
}

// ============================================================
// UI EVENT LISTENERS
// ============================================================
// Mode selection
["easy","normal","hard"].forEach(function(mode) {
  document.getElementById("mode-" + mode).addEventListener("click", function() {
    gameMode = mode;
    document.querySelectorAll(".mode-btn").forEach(function(b) { b.classList.remove("selected"); });
    this.classList.add("selected");
  });
});

document.getElementById("new-campaign-btn").addEventListener("click", function() {
  unlockAudio();
  state.currentLevel = 0;
  state.totalScore = 0;
  state.powerBarCarryOver = 0;
  state.levelsCompleted = [false,false,false,false,false];
  showLevelIntro(0);
});

document.getElementById("begin-btn").addEventListener("click", function() {
  unlockAudio();
  startTraining(state.currentLevel);
});

for (let i=0; i<4; i++) {
  document.getElementById("btn"+i).addEventListener("click", (function(idx) {
    return function() {
      unlockAudio();
      const btn = document.getElementById("btn"+idx);
      if (btn.dataset.mode === "battle") {
        if (!state.battleAnswerLocked) {
          handleBattleAnswer(btn.dataset.val);
        }
      } else {
        if (!state.answerLocked) {
          handleAnswer(btn.dataset.val);
        }
      }
    };
  })(i));
}

// Superpower buttons
document.getElementById("sp-btn-0").addEventListener("click", function() { unlockAudio(); selectSuperpower("fire"); });
document.getElementById("sp-btn-1").addEventListener("click", function() { unlockAudio(); selectSuperpower("lightning"); });
document.getElementById("sp-btn-2").addEventListener("click", function() { unlockAudio(); selectSuperpower("shield"); });
document.getElementById("sp-btn-3").addEventListener("click", function() { unlockAudio(); selectSuperpower("heal"); });

// ============================================================
// INIT
// ============================================================
function init() {
  // Pre-build background for level 0 (title)
  bgCache[0] = createBgCanvas(0);
  resetAmbients(0);
  showTitle();
  requestAnimationFrame(gameLoop);
}

loadSprites(function() {
  init();
});
</script>
