<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Angel vs Devil — Multiplication Battle</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100%; overflow:hidden;
  background:#000; font-family:'Segoe UI',system-ui,sans-serif;
}
#game-wrap {
  position:relative; margin:auto;
  display:flex; align-items:center; justify-content:center;
  width:100vw; height:100vh;
}
#game-container {
  position:relative; overflow:hidden;
  image-rendering:pixelated;
}
#game-canvas {
  display:block; image-rendering:pixelated;
  position:absolute; top:0; left:0;
}
#ui-overlay {
  position:absolute; top:0; left:0; width:100%; height:100%;
  pointer-events:none;
}
#question-area {
  position:absolute; bottom:0; left:0; right:0;
  padding:8px 12px 10px;
  background:linear-gradient(0deg,rgba(0,0,0,0.85) 0%,rgba(0,0,0,0.6) 80%,transparent 100%);
  pointer-events:auto;
  display:none;
}
#question-text {
  text-align:center; font-size:36px; font-weight:bold;
  color:#fff; letter-spacing:2px; margin-bottom:8px;
  text-shadow:0 0 20px rgba(255,220,100,0.8), 0 2px 4px rgba(0,0,0,0.9);
}
#answer-row {
  display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:8px;
  max-width:700px; margin:0 auto;
}
.answer-btn {
  padding:12px 8px; border-radius:10px;
  border:2px solid rgba(255,255,255,0.25);
  background:rgba(20,20,60,0.85);
  color:#fff; font-size:22px; font-weight:bold;
  cursor:pointer; transition:all 0.12s;
  min-height:52px; backdrop-filter:blur(4px);
  text-shadow:0 1px 3px rgba(0,0,0,0.8);
}
.answer-btn:hover { border-color:#ffd700; background:rgba(40,40,90,0.95); transform:translateY(-2px); }
.answer-btn:active { transform:translateY(0); }
.answer-btn.correct { background:rgba(0,180,80,0.9); border-color:#00ee88; }
.answer-btn.wrong   { background:rgba(180,30,30,0.9);  border-color:#ff4444; }
#timer-bar-wrap {
  position:absolute; top:8px; left:50%; transform:translateX(-50%);
  display:none; pointer-events:none;
}
#timer-arc-canvas { display:block; }

#hud-top {
  position:absolute; top:8px; left:0; right:0;
  display:flex; justify-content:space-between; align-items:flex-start;
  padding:0 14px; pointer-events:none; display:none;
}
#hud-left, #hud-right { display:flex; flex-direction:column; gap:4px; }
.hud-label { font-size:11px; color:rgba(255,255,255,0.6); text-transform:uppercase; letter-spacing:1px; }
.hud-val   { font-size:18px; font-weight:bold; color:#ffd700; text-shadow:0 0 8px rgba(255,215,0,0.5); }
#power-bar-wrap { display:none; position:absolute; bottom:140px; left:14px; pointer-events:none; }
#power-bar-bg {
  width:18px; height:140px; background:rgba(0,0,0,0.6);
  border:2px solid rgba(255,255,255,0.3); border-radius:9px; overflow:hidden;
  display:flex; align-items:flex-end;
}
#power-bar-fill {
  width:100%; height:0%; border-radius:7px;
  background:linear-gradient(0deg,#ff8800,#ffdd00,#ffffff);
  transition:height 0.4s ease; box-shadow:0 0 10px rgba(255,200,0,0.6);
}
#power-bar-icon { text-align:center; font-size:18px; margin-top:3px; }

#streak-display {
  display:none; position:absolute; top:56px; left:50%; transform:translateX(-50%);
  font-size:13px; font-weight:bold; color:#ffd700; letter-spacing:2px;
  text-shadow:0 0 10px rgba(255,215,0,0.7);
  pointer-events:none;
}

/* Floating text container */
#float-container {
  position:absolute; top:0; left:0; width:100%; height:100%;
  pointer-events:none; overflow:hidden;
}

/* Title screen */
#title-screen {
  position:absolute; top:0; left:0; width:100%; height:100%;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  background:transparent; pointer-events:auto;
}
#title-logo {
  font-size:52px; font-weight:900; letter-spacing:4px;
  color:#ffd700; text-shadow:0 0 30px rgba(255,215,0,0.7), 0 4px 8px rgba(0,0,0,0.9);
  text-align:center; margin-bottom:6px;
}
#title-sub {
  font-size:16px; color:rgba(255,255,255,0.6); letter-spacing:3px; margin-bottom:48px;
}
.big-btn {
  padding:16px 48px; font-size:22px; font-weight:bold; letter-spacing:2px;
  border:3px solid #ffd700; border-radius:14px;
  background:rgba(30,20,60,0.9); color:#ffd700; cursor:pointer;
  transition:all 0.15s; text-transform:uppercase;
  box-shadow:0 0 20px rgba(255,215,0,0.3), 0 4px 12px rgba(0,0,0,0.6);
  pointer-events:auto;
}
.big-btn:hover { background:rgba(60,40,100,0.95); box-shadow:0 0 35px rgba(255,215,0,0.6); transform:scale(1.04); }
#mode-select { display:flex; gap:10px; margin-bottom:16px; }
.mode-btn {
  padding:8px 20px; font-size:14px; font-weight:bold; letter-spacing:1px;
  border:2px solid #555; border-radius:8px;
  background:rgba(30,20,60,0.7); color:#888; cursor:pointer;
  transition:all 0.15s; text-transform:uppercase;
}
.mode-btn:hover { border-color:#aaa; color:#ccc; }
.mode-btn.selected { border-color:#ffd700; color:#ffd700; box-shadow:0 0 12px rgba(255,215,0,0.3); background:rgba(50,40,20,0.9); }
.answer-btn.eliminated { opacity:0.25; border-color:#222; color:#444; pointer-events:none; transform:scale(0.95); }
.big-btn:active { transform:scale(0.98); }
#progress-dots { display:flex; gap:12px; margin-top:28px; }
.dot {
  width:16px; height:16px; border-radius:50%;
  border:2px solid rgba(255,255,255,0.3);
  background:rgba(0,0,0,0.4); transition:all 0.3s;
}
.dot.done { background:#ffd700; border-color:#ffd700; box-shadow:0 0 8px rgba(255,215,0,0.6); }
.dot.current { background:rgba(255,215,0,0.3); border-color:#ffd700; animation:pulse-dot 1s ease-in-out infinite; }
@keyframes pulse-dot { 0%,100%{transform:scale(1)} 50%{transform:scale(1.2)} }
#score-display { font-size:14px; color:rgba(255,255,255,0.5); margin-top:14px; letter-spacing:1px; }

/* Level intro */
#intro-screen {
  position:absolute; top:0; left:0; width:100%; height:100%;
  display:none; flex-direction:column; align-items:center; justify-content:center;
  background:transparent; pointer-events:auto;
}
#intro-level-tag { font-size:13px; color:rgba(255,255,255,0.5); letter-spacing:4px; margin-bottom:8px; }
#intro-world-name { font-size:44px; font-weight:900; color:#fff; text-shadow:0 0 30px rgba(255,255,255,0.5); margin-bottom:16px; text-align:center; }
#intro-flavor { font-size:16px; color:rgba(255,255,255,0.7); margin-bottom:36px; letter-spacing:1px; font-style:italic; text-align:center; max-width:420px; }

/* Battle placeholder — hidden once real battle is active */
#battle-placeholder { display:none; }

/* Battle HUD */
#battle-hud {
  position:absolute; top:0; left:0; right:0;
  display:none; align-items:flex-start; justify-content:space-between;
  padding:8px 14px 0; pointer-events:none;
}
.bhud-block { display:flex; flex-direction:column; gap:3px; min-width:160px; }
.bhud-block.right { align-items:flex-end; }
.bhud-name { font-size:13px; font-weight:bold; color:#fff; letter-spacing:1px; text-shadow:0 1px 4px rgba(0,0,0,0.9); }
.bhud-hp-wrap { width:160px; height:10px; background:rgba(0,0,0,0.6); border-radius:5px; border:1px solid rgba(255,255,255,0.2); overflow:hidden; }
.bhud-hp-fill { height:100%; border-radius:5px; transition:width 0.25s ease; }
#angel-hp-fill { background:linear-gradient(90deg,#00cc44,#44ff88); }
#boss-hp-fill  { background:linear-gradient(90deg,#ff2222,#ff8844); }
.bhud-hp-num   { font-size:11px; color:rgba(255,255,255,0.7); }

/* Battle timer (center top) */
#battle-timer-wrap {
  position:absolute; top:8px; left:50%; transform:translateX(-50%);
  display:none; pointer-events:none; z-index:10;
}
#battle-timer-arc { display:block; }

/* Superpower chooser */
#superpower-overlay {
  position:absolute; top:0; left:0; right:0; bottom:0;
  display:none; flex-direction:column; align-items:center; justify-content:center;
  background:rgba(0,0,0,0.6); pointer-events:auto; z-index:20;
}
#superpower-title { font-size:22px; font-weight:bold; color:#ffd700; margin-bottom:16px; letter-spacing:2px; text-shadow:0 0 20px rgba(255,215,0,0.8); }
#superpower-choices { display:flex; gap:12px; }
.sp-btn {
  width:120px; height:110px; border-radius:14px; border:2px solid rgba(255,215,0,0.5);
  background:rgba(20,10,50,0.9); color:#fff; cursor:pointer; display:flex;
  flex-direction:column; align-items:center; justify-content:center; gap:6px;
  transition:all 0.15s; pointer-events:auto;
}
.sp-btn:hover { border-color:#ffd700; background:rgba(50,30,100,0.95); transform:scale(1.05); }
.sp-icon { font-size:36px; }
.sp-name { font-size:13px; font-weight:bold; color:#ffd700; }
.sp-desc { font-size:10px; color:rgba(255,255,255,0.6); text-align:center; padding:0 4px; }

/* Battle score / status text */
#battle-status {
  position:absolute; top:56px; left:50%; transform:translateX(-50%);
  font-size:13px; color:rgba(255,255,255,0.55); letter-spacing:1px;
  pointer-events:none; display:none; white-space:nowrap;
}

/* Active power indicator */
#active-power-display {
  position:absolute; bottom:148px; left:14px;
  display:none; align-items:center; gap:6px;
  font-size:13px; color:#ffd700; pointer-events:none;
  text-shadow:0 0 8px rgba(255,215,0,0.6);
}

/* Victory / Defeat overlays */
#outcome-overlay {
  position:absolute; top:0; left:0; right:0; bottom:0;
  display:none; flex-direction:column; align-items:center; justify-content:center;
  background:rgba(0,0,0,0.78); pointer-events:auto; z-index:30;
}
#outcome-title { font-size:52px; font-weight:900; letter-spacing:4px; margin-bottom:8px;
  text-shadow:0 0 40px currentColor; }
#outcome-sub { font-size:16px; color:rgba(255,255,255,0.7); margin-bottom:24px; text-align:center; max-width:400px; }
#outcome-stats { font-size:13px; color:rgba(255,255,255,0.6); margin-bottom:8px; text-align:center; line-height:1.8; }
#outcome-score-breakdown { font-size:14px; color:#ffd700; margin-bottom:28px; text-align:center; line-height:2; }
#outcome-btn { pointer-events:auto; }
#defeat-progress-wrap { width:280px; height:14px; background:rgba(255,255,255,0.15); border-radius:7px; margin:0 auto 24px; overflow:hidden; }
#defeat-progress-fill { height:100%; background:linear-gradient(90deg,#ff4444,#ff8800); border-radius:7px; transition:width 0.8s ease; }

/* Campaign complete overlay */
#campaign-overlay {
  position:absolute; top:0; left:0; right:0; bottom:0;
  display:none; flex-direction:column; align-items:center; justify-content:center;
  background:radial-gradient(ellipse at center, rgba(30,10,80,0.95) 0%, rgba(0,0,0,0.98) 100%);
  pointer-events:auto; z-index:40;
}
#campaign-title { font-size:42px; font-weight:900; color:#ffd700; letter-spacing:3px; text-align:center;
  text-shadow:0 0 40px rgba(255,215,0,0.9); margin-bottom:8px; }
#campaign-sub { font-size:18px; color:rgba(255,255,255,0.8); margin-bottom:6px; text-align:center; }
#campaign-score { font-size:28px; font-weight:bold; color:#fff; margin-bottom:20px; }
#campaign-credits { font-size:10px; color:rgba(255,255,255,0.35); text-align:center; line-height:1.9; max-width:500px; margin-bottom:24px; }
#play-again-btn { pointer-events:auto; }

/* Flash overlay */
#flash-overlay {
  position:absolute; top:0; left:0; width:100%; height:100%;
  pointer-events:none; opacity:0;
  transition:opacity 0.05s;
  background:white;
}

/* Training complete overlay */
#ready-overlay {
  position:absolute; top:0; left:0; width:100%; height:100%;
  display:none; align-items:center; justify-content:center;
  pointer-events:none;
}
#ready-text {
  font-size:54px; font-weight:900; color:#ffd700; letter-spacing:6px;
  text-shadow:0 0 40px rgba(255,215,0,0.9), 0 0 80px rgba(255,180,0,0.5), 0 4px 8px rgba(0,0,0,0.9);
  animation:ready-pulse 0.5s ease-in-out infinite alternate;
}
@keyframes ready-pulse { from{transform:scale(1)} to{transform:scale(1.06)} }

@media (max-width:600px) and (orientation:landscape) {
  #answer-row { grid-template-columns:1fr 1fr; }
  #question-text { font-size:26px; }
  .answer-btn { font-size:18px; min-height:44px; }
}
</style>
</head>
<body>
<div id="game-wrap">
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    <div id="flash-overlay"></div>
    <div id="float-container"></div>
    <div id="ui-overlay">
      <!-- HUD -->
      <div id="hud-top">
        <div id="hud-left">
          <div class="hud-label">Level</div>
          <div class="hud-val" id="hud-level">1</div>
        </div>
        <div id="hud-right">
          <div class="hud-label">Score</div>
          <div class="hud-val" id="hud-score">0</div>
        </div>
      </div>
      <!-- Timer arc -->
      <div id="timer-bar-wrap">
        <canvas id="timer-arc-canvas" width="56" height="56"></canvas>
      </div>
      <!-- Power bar -->
      <div id="power-bar-wrap">
        <div id="power-bar-bg"><div id="power-bar-fill"></div></div>
        <div id="power-bar-icon">⚡</div>
      </div>
      <!-- Streak -->
      <div id="streak-display">STREAK x<span id="streak-num">0</span></div>
      <!-- Question UI -->
      <div id="question-area">
        <div id="question-text">2 × 3 = ?</div>
        <div id="answer-row">
          <button class="answer-btn" id="btn0"></button>
          <button class="answer-btn" id="btn1"></button>
          <button class="answer-btn" id="btn2"></button>
          <button class="answer-btn" id="btn3"></button>
        </div>
      </div>
      <!-- Ready overlay -->
      <div id="ready-overlay">
        <div id="ready-text">READY FOR BATTLE!</div>
      </div>
    </div>

    <!-- Title screen DOM layer -->
    <div id="title-screen">
      <div id="title-logo">ANGEL vs DEVIL</div>
      <div id="title-sub">MULTIPLICATION BATTLE</div>
      <div id="mode-select">
        <button class="mode-btn" id="mode-easy" data-mode="easy">EASY</button>
        <button class="mode-btn selected" id="mode-normal" data-mode="normal">NORMAL</button>
        <button class="mode-btn" id="mode-hard" data-mode="hard">HARD</button>
      </div>
      <button class="big-btn" id="new-campaign-btn">NEW CAMPAIGN</button>
      <div id="progress-dots">
        <div class="dot" id="dot0"></div>
        <div class="dot" id="dot1"></div>
        <div class="dot" id="dot2"></div>
        <div class="dot" id="dot3"></div>
        <div class="dot" id="dot4"></div>
      </div>
      <div id="score-display">Total Score: <span id="total-score-disp">0</span></div>
    </div>

    <!-- Level intro screen -->
    <div id="intro-screen">
      <div id="intro-level-tag">LEVEL 1</div>
      <div id="intro-world-name">ENCHANTED FOREST</div>
      <div id="intro-flavor">The Shadow Wolf awaits in the moonlit clearing...</div>
      <button class="big-btn" id="begin-btn">BEGIN</button>
    </div>

    <!-- Battle placeholder (kept hidden) -->
    <div id="battle-placeholder"></div>

    <!-- Battle HUD -->
    <div id="battle-hud">
      <div class="bhud-block">
        <div class="bhud-name" id="battle-angel-name">Guardian</div>
        <div class="bhud-hp-wrap"><div class="bhud-hp-fill" id="angel-hp-fill" style="width:100%"></div></div>
        <div class="bhud-hp-num"><span id="angel-hp-cur">5</span> / <span id="angel-hp-max">5</span></div>
      </div>
      <div style="width:70px"></div><!-- spacer for timer -->
      <div class="bhud-block right">
        <div class="bhud-name" id="battle-boss-name">Shadow Wolf</div>
        <div class="bhud-hp-wrap" style="text-align:right"><div class="bhud-hp-fill" id="boss-hp-fill" style="width:100%"></div></div>
        <div class="bhud-hp-num" style="text-align:right"><span id="boss-hp-cur">4</span> / <span id="boss-hp-max">4</span></div>
      </div>
    </div>

    <!-- Battle timer -->
    <div id="battle-timer-wrap">
      <canvas id="battle-timer-arc" width="56" height="56"></canvas>
    </div>

    <!-- Battle status line -->
    <div id="battle-status"></div>

    <!-- Active power indicator -->
    <div id="active-power-display"></div>

    <!-- Superpower chooser overlay -->
    <div id="superpower-overlay">
      <div id="superpower-title">CHOOSE A POWER!</div>
      <div id="superpower-choices">
        <button class="sp-btn" id="sp-btn-0">
          <div class="sp-icon">🔥</div>
          <div class="sp-name">Wings of Fire</div>
          <div class="sp-desc">5 damage + fire explosion</div>
        </button>
        <button class="sp-btn" id="sp-btn-1">
          <div class="sp-icon">⚡</div>
          <div class="sp-name">Holy Lightning</div>
          <div class="sp-desc">3 damage + heal angel 2 HP</div>
        </button>
        <button class="sp-btn" id="sp-btn-2">
          <div class="sp-icon">🛡️</div>
          <div class="sp-name">Divine Shield</div>
          <div class="sp-desc">Block next 2 boss attacks</div>
        </button>
        <button class="sp-btn" id="sp-btn-3">
          <div class="sp-icon">💚</div>
          <div class="sp-name">Healing Potion</div>
          <div class="sp-desc">Restore 4 HP</div>
        </button>
      </div>
    </div>

    <!-- Victory / Defeat outcome overlay -->
    <div id="outcome-overlay">
      <div id="outcome-title"></div>
      <div id="outcome-sub"></div>
      <div id="defeat-progress-wrap" style="display:none">
        <div id="defeat-progress-fill" style="width:0%"></div>
      </div>
      <div id="outcome-stats"></div>
      <div id="outcome-score-breakdown"></div>
      <button class="big-btn" id="outcome-btn">NEXT LEVEL</button>
    </div>

    <!-- Campaign complete overlay -->
    <div id="campaign-overlay">
      <div id="campaign-title">YOU SAVED THE REALM!</div>
      <div id="campaign-sub">All five levels conquered!</div>
      <div id="campaign-score"></div>
      <div id="campaign-credits"></div>
      <button class="big-btn" id="play-again-btn">PLAY AGAIN</button>
    </div>

  </div>
</div>


<script src="assets.js"></script>

<script>
"use strict";

// ============================================================
// GAME STATE
// ============================================================
var state = window.state = {
  phase: "title",   // title | level-intro | training | battle | victory | defeat | campaign-complete
  currentLevel: 0,  // 0-indexed
  totalScore: 0,
  levelsCompleted: [false,false,false,false,false],

  // per-level
  angelStage: 0,
  powerBar: 0,
  streak: 0,
  correctCount: 0,
  wrongAnswers: [],
  levelScore: 0,
  questionsAnswered: 0,

  // training question
  currentQ: null,
  questionQueue: [],
  timerStart: 0,
  timerInterval: null,
  timerRemain: 15,
  answerLocked: false,
  showingFeedback: false,

  // battle state
  bossHP: 4,
  bossHPMax: 4,
  angelHP: 5,
  angelHPMax: 5,
  battleQuestions: [],
  battleQIndex: 0,
  battleQCount: 0,
  activeSuperPower: null,   // "fire"|"lightning"|"shield"|null
  hasShield: false,
  battleTimerRemain: 10,
  battleTimerMax: 10,
  battleAnswerLocked: false,
  battleWrongCount: 0,
  battleCorrectCount: 0,
  battleFastestAnswer: 99,
  noDamageTaken: true,
  perfectTraining: false,
  trainingAvgTime: 0,
  trainingTimes: [],
  bossInitialHP: 4,
  // animation state
  angelX: 0, angelY: 0, bossX: 0, bossY: 0,
  angelKnockback: 0, bossKnockback: 0,
  angelFlash: 0, bossFlash: 0,
  angelRise: 0,
  bossDefeated: false, bossDefeatedTimer: 0,
  bossEntranceX: 0, bossEntrancePhase: 0,
  // evolution transition
  evolutionFlash: 0, evolutionFadeOut: 0, evolutionFadeIn: 0,
  evolutionOldStage: 0, evolutionNewStage: 0,
  evolutionTextScale: 0, evolutionTextAlpha: 0,
  evolutionTextStr: "",
  evolutionActive: false,
  // seraphim sparkles
  seraphimSparkles: [],
  // frost sparkles around witch
  frostSparkles: [],
  // boss entrance per-type
  entranceTick: 0,
  // auto-attack timers
  angelAutoTimer: null,
  bossAutoTimer: null,
  questionTimer: null,
  shieldCharges: 0,       // blocks remaining from Divine Shield
  questionPending: false, // true while a question is showing
  battleTotalAsked: 0,    // total questions asked (for stats)
  lastShotTime: 0,        // timestamp of last player shot (rate-limit)
  totalShotsFired: 0,     // total shots fired by player this battle
};

// ============================================================
// CANVAS SETUP
// ============================================================
const wrap     = document.getElementById("game-wrap");
container= document.getElementById("game-container");
const canvas   = document.getElementById("game-canvas");
ctx = canvas.getContext("2d");
const timerCv  = document.getElementById("timer-arc-canvas");
const timerCtx = timerCv.getContext("2d");
canvas.width = W; canvas.height = H;
canvas.style.imageRendering = "pixelated";

function resize() {
  const vw = window.innerWidth, vh = window.innerHeight;
  const scale = Math.min(vw/W, vh/H);
  const pw = Math.floor(W * scale), ph = Math.floor(H * scale);
  container.style.width  = pw + "px";
  container.style.height = ph + "px";
  canvas.style.width  = pw + "px";
  canvas.style.height = ph + "px";
  // ui-overlay fills container exactly; all children use % or absolute positioning relative to it
  // No additional scaling needed — elements are positioned in CSS % units or via JS canvas coordinates
}
window.addEventListener("resize", resize);
resize();


// ============================================================
// TRAINING TIMER
// ============================================================
let timerInterval = null;
let timerRemain = 15;
let lastTickSecond = 15;

function startQuestionTimer() {
  var maxTime = MODE_CONFIG[gameMode].trainTimer;
  timerRemain = maxTime;
  lastTickSecond = maxTime;
  state.timerStart = Date.now();
  state.hintsGiven = 0; // track which wrong answers have been eliminated
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(function() {
    if (state.phase !== "training" || state.answerLocked) return;
    timerRemain = Math.max(0, maxTime - (Date.now() - state.timerStart)/1000);
    var fraction = timerRemain / maxTime;
    var s = Math.ceil(timerRemain);
    if (s < lastTickSecond) {
      lastTickSecond = s;
      if (s <= 3 && s > 0) sfxTimerUrgent();
      else if (s > 0) sfxTimerTick();
    }
    // Easy mode hints: eliminate wrong answers as time passes
    if (MODE_CONFIG[gameMode].hints && state.currentQ) {
      var correct = state.currentQ.a * state.currentQ.b;
      if (fraction < 0.66 && state.hintsGiven === 0) {
        eliminateOneWrong(correct);
        state.hintsGiven = 1;
      } else if (fraction < 0.33 && state.hintsGiven === 1) {
        eliminateOneWrong(correct);
        state.hintsGiven = 2;
      }
    }
    if (timerRemain <= 0) {
      clearInterval(timerInterval);
      timerInterval = null;
      handleAnswer(null); // timeout
    }
    drawTimerArc(fraction);
  }, 80);
}

function eliminateOneWrong(correct) {
  // Find a visible wrong answer button and grey it out
  for (var i = 0; i < 4; i++) {
    var btn = document.getElementById("btn" + i);
    if (parseInt(btn.dataset.val) !== correct && !btn.classList.contains("eliminated")) {
      btn.classList.add("eliminated");
      btn.disabled = true;
      return;
    }
  }
}

function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

function drawTimerArc(fraction) {
  timerCtx.clearRect(0,0,56,56);
  const cx=28, cy=28, r=22;
  // Background circle
  timerCtx.beginPath(); timerCtx.arc(cx,cy,r,0,Math.PI*2);
  timerCtx.strokeStyle="rgba(255,255,255,0.15)"; timerCtx.lineWidth=4; timerCtx.stroke();
  // Progress
  const color = fraction > 0.4 ? "#44ff88" : fraction > 0.2 ? "#ffcc00" : "#ff4444";
  timerCtx.beginPath();
  timerCtx.arc(cx,cy,r,-Math.PI/2,-Math.PI/2 + Math.PI*2*fraction);
  timerCtx.strokeStyle=color; timerCtx.lineWidth=4; timerCtx.lineCap="round"; timerCtx.stroke();
  // Time text
  timerCtx.fillStyle="#fff"; timerCtx.font="bold 14px Segoe UI";
  timerCtx.textAlign="center"; timerCtx.textBaseline="middle";
  timerCtx.fillText(Math.ceil(timerRemain), cx, cy);
}

// Battle timer (separate from training timer)
let battleTimerInterval = null;
let lastBattleTickSecond = 99;

function startBattleTimer() {
  var cfg = LEVEL_CONFIG[state.currentLevel];
  var timerAdj = MODE_CONFIG[gameMode].battleTimerAdj;
  var maxTime = Math.max(4, cfg.battleTimer + timerAdj);
  state.battleTimerMax = maxTime;
  state.battleTimerRemain = maxTime;
  state.timerStart = Date.now();
  state.hintsGiven = 0;
  lastBattleTickSecond = maxTime;
  if (battleTimerInterval) clearInterval(battleTimerInterval);
  battleTimerInterval = setInterval(function() {
    if (state.phase !== "battle" || state.battleAnswerLocked) return;
    state.battleTimerRemain = Math.max(0, maxTime - (Date.now() - state.timerStart)/1000);
    var fraction = state.battleTimerRemain / maxTime;
    var s = Math.ceil(state.battleTimerRemain);
    if (s < lastBattleTickSecond) {
      lastBattleTickSecond = s;
      if (s <= 3 && s > 0) sfxTimerUrgent();
      else if (s > 0) sfxTimerTick();
    }
    // Easy mode hints in battle too
    if (MODE_CONFIG[gameMode].hints && state.currentQ) {
      var bq = state.currentQ;
      var correct = bq.a * bq.b;
      if (fraction < 0.66 && state.hintsGiven === 0) {
        eliminateOneWrong(correct);
        state.hintsGiven = 1;
      } else if (fraction < 0.33 && state.hintsGiven === 1) {
        eliminateOneWrong(correct);
        state.hintsGiven = 2;
      }
    }
    drawBattleTimerArc(fraction);
    if (state.battleTimerRemain <= 0) {
      clearInterval(battleTimerInterval);
      battleTimerInterval = null;
      handleBattleAnswer(null);
    }
  }, 80);
}

function stopBattleTimer() {
  if (battleTimerInterval) { clearInterval(battleTimerInterval); battleTimerInterval = null; }
}

function clearBattleTimers() {
  stopBattleTimer();
  if (state.bossAutoTimer)  { clearTimeout(state.bossAutoTimer);   state.bossAutoTimer  = null; }
  if (state.questionTimer)  { clearTimeout(state.questionTimer);   state.questionTimer  = null; }
  removeBattleEventListeners();
}

// Shooting event listeners — stored so we can remove them on battle end
var _battleKeyHandler      = null;
var _battleMouseHandler    = null;
var _battleTouchHandler    = null;

function removeBattleEventListeners() {
  if (_battleKeyHandler)   { document.removeEventListener("keydown",     _battleKeyHandler);   _battleKeyHandler   = null; }
  if (_battleMouseHandler) { canvas.removeEventListener("mousedown",     _battleMouseHandler); _battleMouseHandler = null; }
  if (_battleTouchHandler) { canvas.removeEventListener("touchstart",    _battleTouchHandler); _battleTouchHandler = null; }
}

// Player shoots: fires Light Beam at boss, rate-limited to max 2/sec
function doPlayerShoot() {
  if (state.phase !== "battle") return;
  if (state.bossDefeated) return;
  if (document.getElementById("superpower-overlay").style.display === "flex") return;
  if (state.bossEntrancePhase < 2) return;

  const now = Date.now();
  if (now - state.lastShotTime < 500) return; // max 2 shots/sec
  state.lastShotTime = now;
  state.totalShotsFired++;
  // Track recent shots for adaptive boss speed
  if (!state.recentShots) state.recentShots = [];
  state.recentShots.push(now);
  if (state.recentShots.length > 10) state.recentShots.shift();

  const isKrakenP = (state.currentLevel === 2);
  const bossCXP = state.bossX + (isKrakenP ? 96*1.4 : 48*3)*0.5;
  const bossCYP = state.bossY + (isKrakenP ? 128*1.4 : 64*3)*0.5;

  const angelX = state.angelX + 48*3;
  const angelY = state.angelY + 64*1.5;

  sfxAttackHit();

  switch (state.angelStage) {
    case 0: spawnFeebleSpark(angelX, angelY, bossCXP, bossCYP); break;
    case 1: spawnLightBolt(angelX, angelY, bossCXP, bossCYP); break;
    case 2: spawnHolyArrow(angelX, angelY, bossCXP, bossCYP); break;
    case 3: spawnSacredLance(angelX, angelY, bossCXP, bossCYP); break;
    case 4: spawnDivineBarrage(angelX, angelY, bossCXP, bossCYP); break;
    default: spawnLightBeam(angelX, angelY, bossCXP, bossCYP); break;
  }

  if (state.angelStage <= 1) {
    state.bossFlash = 2;
    state.bossKnockback = 3;
  } else if (state.angelStage === 2) {
    state.bossFlash = 4;
    state.bossKnockback = 5;
  } else if (state.angelStage === 3) {
    state.bossFlash = 5;
    state.bossKnockback = 7;
    triggerShake(1);
  } else if (state.angelStage === 4) {
    state.bossFlash = 6;
    state.bossKnockback = 8;
    triggerShake(2);
    triggerFlash("rgba(255,215,0,0.08)", 30);
  }

  // Archangel and Seraphim (stages 3-4) hit for 2 damage per shot
  var shotDmg = state.angelStage >= 3 ? 2 : 1;
  state.bossHP -= shotDmg;
  state.levelScore += shotDmg * 30;
  var dmgColor = shotDmg >= 2 ? "#ffd700" : "#aaddff";
  spawnFloatText("-" + shotDmg, bossCXP - 20, state.bossY + 20, dmgColor, shotDmg >= 2 ? 18 : 16);
  updateBattleHUD();

  if (state.bossHP <= 0) {
    state.bossHP = 0;
    updateBattleHUD();
    setTimeout(function() { battleVictory(); }, 800);
  }
}

function drawBattleTimerArc(fraction) {
  const cv = document.getElementById("battle-timer-arc");
  if (!cv) return;
  const bx = cv.getContext("2d");
  bx.clearRect(0,0,56,56);
  const cx=28, cy=28, r=22;
  bx.beginPath(); bx.arc(cx,cy,r,0,Math.PI*2);
  bx.strokeStyle="rgba(255,255,255,0.15)"; bx.lineWidth=4; bx.stroke();
  const color = fraction > 0.4 ? "#ff8888" : fraction > 0.2 ? "#ffcc00" : "#ff2222";
  bx.beginPath();
  bx.arc(cx,cy,r,-Math.PI/2,-Math.PI/2 + Math.PI*2*fraction);
  bx.strokeStyle=color; bx.lineWidth=4; bx.lineCap="round"; bx.stroke();
  bx.fillStyle="#fff"; bx.font="bold 14px Segoe UI";
  bx.textAlign="center"; bx.textBaseline="middle";
  bx.fillText(Math.ceil(state.battleTimerRemain), cx, cy);
}


// ============================================================
// POWER BAR
// ============================================================
function updatePowerBarDOM() {
  const pct = Math.min(100, state.powerBar);
  document.getElementById("power-bar-fill").style.height = pct + "%";
}

function computePowerBar() {
  const cfg = LEVEL_CONFIG[state.currentLevel];
  var base = state.powerBarBase || 0;
  var fromAnswers = (state.correctCount / cfg.trainQ) * 100;
  return Math.min(100, base + fromAnswers);
}

// ============================================================
// ANGEL STAGE MANAGEMENT
// ============================================================
function checkEvolution() {
  const cfg = LEVEL_CONFIG[state.currentLevel];
  const thresh = cfg.stageThresh; // [s1,s2,s3,s4]
  let newStage = 0;
  if (state.correctCount >= thresh[3]) newStage = 4;
  else if (state.correctCount >= thresh[2]) newStage = 3;
  else if (state.correctCount >= thresh[1]) newStage = 2;
  else if (state.correctCount >= thresh[0]) newStage = 1;
  if (newStage > state.angelStage) {
    const oldStage = state.angelStage;
    state.angelStage = newStage;
    triggerEvolution(newStage);
  }
}

function triggerEvolution(stage) {
  const stageColors = ["#888888","#aaaaff","#88ccff","#ffd700","#ffaa00"];
  const color = stageColors[stage] || "#ffd700";
  sfxPowerUp();

  // Start smooth evolution transition
  state.evolutionActive = true;
  state.evolutionOldStage = stage - 1;
  state.evolutionNewStage = stage;
  state.evolutionFadeOut = 1.0;  // old stage fading out
  state.evolutionFadeIn = 0.0;   // new stage fading in
  state.evolutionFlash = 0;
  state.evolutionTextStr = STAGE_NAMES[stage].toUpperCase() + "!";
  state.evolutionTextScale = 0.1;
  state.evolutionTextAlpha = 1.0;

  // Brief pause then white flash
  setTimeout(function() {
    triggerFlash("rgba(255,255,255,0.9)", 250);
    state.evolutionFlash = 1; // signal flash happened
  }, 300);

  // Burst in themed color
  const burstColor = color;
  setTimeout(function() {
    spawnParticleBurst(W*0.28, H*0.45, 40, burstColor, 7, 5);
    spawnParticleBurst(W*0.28, H*0.55, 20, "#ffffff", 4, 3);
  }, 350);

  // After 1.2s, fade old sprite out + new sprite fades in (done via evolutionFadeOut/In in renderTraining)
  // Text pops up immediately
  setTimeout(function() {
    state.evolutionActive = false;
    state.evolutionFadeOut = 0;
    state.evolutionFadeIn = 1;
  }, 1200);
}

// ============================================================
// HUD UPDATES
// ============================================================
function updateHUD() {
  document.getElementById("hud-level").textContent = state.currentLevel + 1;
  document.getElementById("hud-score").textContent = (state.totalScore + state.levelScore).toLocaleString();
  document.getElementById("streak-num").textContent = state.streak;
  document.getElementById("streak-display").style.display = state.streak >= 2 ? "block" : "none";
}

function updateProgressDots() {
  for (let i=0; i<5; i++) {
    const dot = document.getElementById("dot"+i);
    dot.className = "dot";
    if (state.levelsCompleted[i]) dot.classList.add("done");
    else if (i === state.currentLevel) dot.classList.add("current");
  }
  document.getElementById("total-score-disp").textContent = state.totalScore.toLocaleString();
}

// ============================================================
// PHASE: TITLE
// ============================================================
function showTitle() {
  state.phase = "title";
  stopTimer();
  clearBattleTimers();
  hideAllOverlays();
  document.getElementById("title-screen").style.display = "flex";
  state.bossDefeated = false;
  updateProgressDots();

  if (!bgCache[0]) bgCache[0] = createBgCanvas(0);

}

// ============================================================
// PHASE: LEVEL INTRO
// ============================================================
function showLevelIntro(levelIdx) {
  state.phase = "level-intro";
  state.currentLevel = levelIdx;
  const cfg = LEVEL_CONFIG[levelIdx];
  clearBattleTimers();
  hideAllOverlays();
  document.getElementById("intro-screen").style.display = "flex";
  state.bossDefeated = false;
  document.getElementById("intro-level-tag").textContent = "LEVEL " + (levelIdx+1);
  document.getElementById("intro-world-name").textContent = cfg.world.toUpperCase();
  const flavors = [
    "The Shadow Wolf lurks in the moonlit clearing...",
    "The Frost Witch cackles from the frozen peaks...",
    "The Kraken Lord stirs beneath the sunken ruins...",
    "The Devil Queen commands her volcanic fortress...",
    "The Violet Avenger guards the dark throne itself..."
  ];
  document.getElementById("intro-flavor").textContent = flavors[levelIdx];
  // Prep background
  if (!bgCache[levelIdx]) bgCache[levelIdx] = createBgCanvas(levelIdx);
  resetAmbients(levelIdx);
}

// ============================================================
// PHASE: TRAINING
// ============================================================
function startTraining(levelIdx) {
  state.phase = "training";
  state.currentLevel = levelIdx;
  // Carry over power from previous level (0 for first level or retry)
  var carryOver = state.powerBarCarryOver || 0;
  state.powerBar = carryOver;
  state.powerBarBase = carryOver; // base offset for computePowerBar
  // Set starting angel stage based on carried power
  state.angelStage = carryOver >= 100 ? 4 : carryOver >= 70 ? 3 : carryOver >= 45 ? 2 : carryOver >= 20 ? 1 : 0;
  state.streak = 0;
  state.correctCount = 0;
  state.wrongAnswers = [];
  state.levelScore = 0;
  state.questionsAnswered = 0;
  state.answerLocked = false;
  state.trainingTimes = [];
  state.evolutionActive = false;
  state.evolutionTextStr = "";
  state.evolutionTextAlpha = 0;
  state.evolutionTextScale = 0;
  state.evolutionFadeOut = 0;
  state.evolutionFadeIn = 0;
  state.evolutionFlash = 0;
  state.seraphimSparkles = [];
  state.frostSparkles = [];

  state.questionQueue = generateQuestionQueue(levelIdx);

  clearBattleTimers();
  hideAllOverlays();
  // Clear battle mode from answer buttons (leftover from previous level's battle)
  for (let i = 0; i < 4; i++) {
    const btn = document.getElementById("btn" + i);
    if (btn) { btn.dataset.mode = ""; btn.className = "answer-btn"; }
  }
  document.getElementById("question-area").style.display = "block";
  document.getElementById("hud-top").style.display = "flex";
  document.getElementById("power-bar-wrap").style.display = "block";
  document.getElementById("timer-bar-wrap").style.display = "block";

  if (!bgCache[levelIdx]) bgCache[levelIdx] = createBgCanvas(levelIdx);
  resetAmbients(levelIdx);
  updateHUD();
  nextQuestion();
}

function nextQuestion() {
  if (state.questionsAnswered >= LEVEL_CONFIG[state.currentLevel].trainQ) {
    trainingComplete();
    return;
  }
  const q = state.questionQueue[state.questionsAnswered];
  state.currentQ = q;
  state.answerLocked = false;

  document.getElementById("question-text").textContent = q.a + " × " + q.b + " = ?";
  const choices = generateDistractors(q.a, q.b, state.currentLevel);
  for (let i=0; i<4; i++) {
    const btn = document.getElementById("btn"+i);
    btn.textContent = choices[i];
    btn.className = "answer-btn";
    btn.dataset.val = choices[i];
    btn.disabled = false;
  }
  startQuestionTimer();
}

function handleAnswer(chosenVal) {
  if (state.answerLocked) return;
  state.answerLocked = true;
  stopTimer();

  const q = state.currentQ;
  const correct = q.a * q.b;
  const elapsed = (Date.now() - state.timerStart) / 1000;
  const isCorrect = (chosenVal !== null && parseInt(chosenVal) === correct);
  const isTimeout = (chosenVal === null);

  if (isCorrect) {
    // Track answer time
    if (state.trainingTimes) state.trainingTimes.push(elapsed);
    // Score
    let pts = 50, label = "CORRECT", color = "#aaaaff";
    for (const sp of SPEED_LABELS) {
      if (elapsed < sp.thresh) { pts = sp.pts; label = sp.label; color = sp.color; break; }
    }
    // Streak multiplier
    state.streak++;
    let mult = 1;
    for (const sm of STREAK_MULT) { if (state.streak >= sm[0]) mult = sm[1]; }
    const finalPts = Math.round(pts * mult);
    state.levelScore += finalPts;
    state.correctCount++;
    state.powerBar = computePowerBar();
    updatePowerBarDOM();

    // Visual feedback
    triggerFlash("rgba(255,255,255,0.4)", 60);
    sfxCorrect();
    spawnFloatText("+" + finalPts + " " + label, W*0.5, H*0.45, color, 24);

    // Streak sfx/visual
    if (state.streak === 3 || state.streak === 5 || state.streak === 7) {
      setTimeout(function() { sfxStreak(); }, 200);
      spawnParticleBurst(W*0.5, H*0.4, 20, "#ffd700", 5, 3);
      spawnFloatText("STREAK x"+state.streak+"! 🔥", W*0.5, H*0.35, "#ffd700", 22);
    }

    // Highlight correct button
    for (let i=0; i<4; i++) {
      const btn = document.getElementById("btn"+i);
      if (parseInt(btn.dataset.val) === correct) btn.classList.add("correct");
    }

    // Check evolution
    checkEvolution();
    updateHUD();

    // Power bar full → skip remaining questions, go to battle
    if (state.powerBar >= 100) {
      state.questionsAnswered = LEVEL_CONFIG[state.currentLevel].trainQ;
      setTimeout(function() { trainingComplete(); }, 600);
      return;
    }

    setTimeout(function() { nextQuestion(); }, 600);

  } else {
    // Wrong or timeout
    sfxWrong();
    state.streak = 0;
    state.wrongAnswers.push({ a: q.a, b: q.b });

    // Show correct answer green, wrong answer red
    for (let i=0; i<4; i++) {
      const btn = document.getElementById("btn"+i);
      const val = parseInt(btn.dataset.val);
      if (val === correct) btn.classList.add("correct");
      else if (chosenVal !== null && val === parseInt(chosenVal)) btn.classList.add("wrong");
    }
    if (isTimeout) spawnFloatText("TIME!", W*0.5, H*0.45, "#ff6666", 22);
    else spawnFloatText("✗ " + correct, W*0.5, H*0.45, "#ff6666", 22);

    updateHUD();
    setTimeout(function() {
      state.questionsAnswered++;
      nextQuestion();
    }, 1500);
    return;
  }
  state.questionsAnswered++;
}

// ============================================================
// TRAINING COMPLETE
// ============================================================
function trainingComplete() {
  stopTimer();
  state.answerLocked = true;
  document.getElementById("question-area").style.display = "none";
  document.getElementById("timer-bar-wrap").style.display = "none";

  // Sky darkens
  triggerFlash("rgba(0,0,80,0.3)", 400);
  setTimeout(function() { triggerFlash("rgba(0,0,80,0.3)", 400); }, 500);

  // Lightning flash
  setTimeout(function() { triggerFlash("white", 100); }, 800);
  setTimeout(function() { triggerFlash("white", 100); }, 1000);

  // "READY FOR BATTLE" text
  setTimeout(function() {
    sfxTransition();
    document.getElementById("ready-overlay").style.display = "flex";
    spawnParticleBurst(W*0.5, H*0.4, 40, "#ffd700", 8, 5);
  }, 1200);

  // Transition to battle
  setTimeout(function() {
    document.getElementById("ready-overlay").style.display = "none";
    startBattle();
  }, 3200);
}

// ============================================================
// HELPERS: hide/show all overlay screens
// ============================================================
function hideAllOverlays() {
  ["title-screen","intro-screen","battle-hud","battle-timer-wrap","battle-status",
   "active-power-display","superpower-overlay","outcome-overlay","campaign-overlay",
   "question-area","hud-top","power-bar-wrap","timer-bar-wrap","streak-display",
   "ready-overlay","battle-placeholder"].forEach(function(id) {
    const el = document.getElementById(id);
    if (el) el.style.display = "none";
  });
}

// ============================================================
// PHASE: BATTLE
// ============================================================
function startBattle() {
  const lvl = state.currentLevel;
  const cfg = LEVEL_CONFIG[lvl];

  state.phase = "battle";
  var modeHP = MODE_CONFIG[gameMode];
  state.bossHP = BOSS_HP[lvl] + modeHP.bossHPAdj;
  state.bossHPMax = BOSS_HP[lvl] + modeHP.bossHPAdj;
  state.bossInitialHP = BOSS_HP[lvl] + modeHP.bossHPAdj;
  state.angelHP = ANGEL_HP[lvl] + modeHP.angelHPAdj;
  state.angelHPMax = ANGEL_HP[lvl] + modeHP.angelHPAdj;

  // Seed question pool: wrong answers from training first, then full table for refill
  const wrongPool = state.wrongAnswers.slice().sort(function() { return Math.random()-0.5; });
  const tablePool = [];
  for (let b = 1; b <= 10; b++) tablePool.push({ a: cfg.table, b: b });
  tablePool.sort(function() { return Math.random()-0.5; });
  // Combine: wrong answers first, rest from table
  state.battleQuestions = wrongPool.concat(tablePool);

  state.battleQIndex = 0;
  state.battleQCount = 0;          // no fixed count — fight until HP=0
  state.battleTotalAsked = 0;
  state.activeSuperPower = null;
  state.hasShield = false;
  state.shieldCharges = 0;
  state.battleAnswerLocked = false;
  state.battleWrongCount = 0;
  state.battleCorrectCount = 0;
  state.battleFastestAnswer = 99;
  state.noDamageTaken = true;
  state.bossDefeated = false;
  state.angelKnockback = 0; state.bossKnockback = 0;
  state.angelFlash = 0; state.bossFlash = 0;
  state.angelRise = 0;
  state.lastShotTime = 0;
  state.totalShotsFired = 0;
  state.recentShots = [];
  state.battleStartTime = Date.now();
  state.frostSparkles = [];
  state.seraphimSparkles = [];
  state.questionPending = false;

  // Perfect training: no wrong answers
  state.perfectTraining = (state.wrongAnswers.length === 0);

  // Compute avg answer time from training
  state.trainingAvgTime = state.trainingTimes && state.trainingTimes.length ?
    state.trainingTimes.reduce(function(a,b){return a+b;},0)/state.trainingTimes.length : 99;

  // Battle positions
  const isKraken = (lvl === 2);
  const bossScale = isKraken ? 1.4 : 3;
  const bossW = isKraken ? 96*bossScale : 48*bossScale;
  const bossH = isKraken ? 128*bossScale : 64*bossScale;
  state.angelX = 50;
  state.angelY = H*0.28;
  state.bossX = W - bossW - 40;
  state.bossY = H*0.28;
  state.bossEntranceX = W + bossW;
  state.bossEntrancePhase = 0;

  hideAllOverlays();
  document.getElementById("battle-hud").style.display = "flex";
  document.getElementById("battle-timer-wrap").style.display = "block";
  // Power bar is for training only; hide it during battle
  document.getElementById("power-bar-wrap").style.display = "none";
  document.getElementById("battle-status").style.display = "block";

  document.getElementById("battle-angel-name").textContent = STAGE_NAMES[state.angelStage];
  document.getElementById("battle-boss-name").textContent = cfg.boss;
  updateBattleHUD();

  if (!bgCache[lvl]) bgCache[lvl] = createBgCanvas(lvl);
  resetAmbients(lvl);

  sfxBattleStart();
  triggerFlash("rgba(0,0,0,0.8)", 400);
  state.entranceTick = 0;
  state.battleAnswerLocked = true;

  setTimeout(function() {
    state.bossEntrancePhase = 1;
    setTimeout(function() {
      state.bossEntrancePhase = 2;

      // Start battle timers
      const bc = BATTLE_CONFIG[lvl];

      // Boss auto-attacks adaptively based on player shooting speed
      scheduleBossAttack();

      // Questions appear periodically (independent of boss attacks)
      state.questionTimer = setTimeout(function() {
        if (state.phase !== "battle") return;
        showBattleQuestion();
      }, bc.questionInterval * 1000);

      // Register player shooting listeners
      removeBattleEventListeners(); // safety: clear any leftover
      _battleKeyHandler = function(e) {
        // Any key fires a shot (don't intercept if super power overlay is open)
        if (document.getElementById("superpower-overlay").style.display === "flex") return;
        doPlayerShoot();
      };
      _battleMouseHandler = function(e) {
        doPlayerShoot();
      };
      _battleTouchHandler = function(e) {
        doPlayerShoot();
      };
      document.addEventListener("keydown",  _battleKeyHandler);
      canvas.addEventListener("mousedown",  _battleMouseHandler);
      canvas.addEventListener("touchstart", _battleTouchHandler, { passive: true });

    }, 1500);
  }, 600);
}

function updateBattleHUD() {
  const aFrac = Math.max(0, state.angelHP / state.angelHPMax);
  const bFrac = Math.max(0, state.bossHP / state.bossHPMax);
  document.getElementById("angel-hp-fill").style.width = (aFrac*100).toFixed(1)+"%";
  document.getElementById("boss-hp-fill").style.width  = (bFrac*100).toFixed(1)+"%";
  document.getElementById("angel-hp-cur").textContent = Math.max(0,state.angelHP);
  document.getElementById("boss-hp-cur").textContent  = Math.max(0,state.bossHP);
  document.getElementById("angel-hp-max").textContent = state.angelHPMax;
  document.getElementById("boss-hp-max").textContent  = state.bossHPMax;
  document.getElementById("battle-status").textContent =
    "Shots: " + state.totalShotsFired + "  |  Score: " + (state.totalScore+state.levelScore).toLocaleString();
}

function showBattleQuestion() {
  if (state.phase !== "battle") return;
  if (state.questionPending) return;  // already showing a question

  const q = nextBattleQuestionFromPool();
  state.currentQ = q;
  state.battleTotalAsked++;
  state.questionPending = true;
  state.battleAnswerLocked = false;

  document.getElementById("question-area").style.display = "block";
  document.getElementById("question-text").textContent = q.a + " × " + q.b + " = ?";

  const choices = generateDistractors(q.a, q.b, state.currentLevel);
  for (let i=0; i<4; i++) {
    const btn = document.getElementById("btn"+i);
    btn.textContent = choices[i];
    btn.className = "answer-btn";
    btn.dataset.val = choices[i];
    btn.dataset.mode = "battle";
    btn.disabled = false;
  }

  startBattleTimer();
}

// Called after battle question resolves; waits then spawns next question
function scheduleNextQuestion() {
  if (state.phase !== "battle") return;
  if (state.questionTimer) { clearTimeout(state.questionTimer); state.questionTimer = null; }
  // Pause ~2s after resolving, then wait the full questionInterval before showing next question
  const bc = BATTLE_CONFIG[state.currentLevel];
  const delay = Math.max(2000, bc.questionInterval * 1000);
  state.questionTimer = setTimeout(function() {
    state.questionTimer = null;
    if (state.phase !== "battle") return;
    showBattleQuestion();
  }, delay);
}


// Adaptive boss attack scheduling — boss matches the player's shooting pace but fatigues over time
function getAdaptiveBossInterval() {
  var bc = BATTLE_CONFIG[state.currentLevel];
  var baseInterval = bc.bossAutoInterval * 1000; // fallback in ms
  if (!state.recentShots || state.recentShots.length < 2) return baseInterval;
  var shots = state.recentShots;
  var playerInterval;
  if (shots.length < 10) {
    playerInterval = shots[shots.length - 1] - shots[shots.length - 2];
  } else {
    playerInterval = (shots[shots.length - 1] - shots[0]) / (shots.length - 1);
  }
  // Boss attacks at 1.3x the player's pace
  var bossInterval = playerInterval * 1.3;
  // Boss fatigue: after 15 seconds of battle, boss slows down progressively
  // At 15s: 1.0x, at 30s: 1.3x, at 45s: 1.6x, at 60s: 2.0x
  var battleElapsed = (Date.now() - (state.battleStartTime || Date.now())) / 1000;
  if (battleElapsed > 15) {
    var fatigue = 1.0 + (battleElapsed - 15) / 45; // ramps from 1.0 to ~2.0 over 45s
    bossInterval *= fatigue;
  }
  // Clamp: min 800ms, max = base config * 2 (fatigued boss can be slower than base)
  return Math.max(800, Math.min(bossInterval, baseInterval * 2));
}

function scheduleBossAttack() {
  if (state.phase !== "battle") return;
  var interval = getAdaptiveBossInterval();
  state.bossAutoTimer = setTimeout(function() {
    if (state.phase !== "battle") return;
    doBossAutoAttack();
    scheduleBossAttack(); // schedule next one
  }, interval);
}

// Boss fires its themed attack automatically — 1 damage
function doBossAutoAttack() {
  if (state.phase !== "battle") return;
  const lvl = state.currentLevel;
  const isKrakenB = (lvl === 2);
  const bossWB = isKrakenB ? 96*1.4 : 48*3;

  if (state.shieldCharges > 0) {
    state.shieldCharges--;
    if (state.shieldCharges === 0) {
      state.hasShield = false;
      updateActivePowerDisplay();
    }
    const shCX = state.angelX + 48*3*0.5;
    const shCY = state.angelY + 64*3*0.5;
    const shR  = 64*3*0.65;
    triggerFlash("rgba(255,215,0,0.7)", 100);
    triggerShake(3);
    addEffect("shieldShatterRing", { cx: shCX, cy: shCY }, 500);
    for (let fi = 0; fi < 12; fi++) {
      addEffect("shieldShatter", { cx: shCX, cy: shCY, r: shR, fragIdx: fi, seed: Math.random()*100 }, 600);
    }
    spawnParticleBurst(shCX, shCY, 20, "#ffd700", 5, 2);
    spawnFloatText("SHIELD BLOCKED!", W*0.3, H*0.38, "#ffd700", 18);
    sfxAttackHit();
    return;
  }

  sfxDevilAttack();
  state.angelHP -= 1;
  state.angelFlash = 4;
  state.angelKnockback = 6;
  state.noDamageTaken = false;
  spawnBossAttack(
    lvl,
    state.angelX + 48*3*0.5, state.angelY + 64*1.5,
    state.bossX + bossWB*0.5, state.bossY + (isKrakenB?128*1.4:64*3)*0.5
  );
  triggerShake(2);
  spawnFloatText("-1", state.angelX + 40, state.angelY + 20, "#ff7777", 16);
  updateBattleHUD();

  if (state.angelHP <= 0) {
    state.angelHP = 0;
    updateBattleHUD();
    setTimeout(function() { battleDefeat(); }, 800);
  }
}
