<style>

  .boss-card:hover { border-color:#ff4444; }

  .credits { margin-top:24px; font-size:10px; color:#555; text-align:center; line-height:1.6; }
  .credits a { color:#6688bb; }
  .arrow { color:#ffd700; font-size:24px; display:flex; align-items:center; padding-top:20px; }

const FW=48, FH=64, SC=2.5;

function load(src) { return new Promise(r=>{ const i=new Image(); i.onload=()=>r(i); i.src=src; }); }

function frame(ctx,img,row,col,dx,dy,sc) {
  ctx.imageSmoothingEnabled=false;
  ctx.drawImage(img, col*FW, row*FH, FW, FH, dx, dy, FW*sc, FH*sc);
}

async function init() {
  const img = {};
  for (const [k,src] of Object.entries(IMGS)) img[k] = await load(src);

  // ===== ANGEL STAGES =====
  // f2 = angel-f-002 (cream/white robes, silver wings) -> stages 0, 1
  // f1 = angel-f-001 (blue/white robes, white wings)   -> stage 2
  // m1 = angel-m-001 (golden armor, red cape)           -> stages 3, 4

  const stages = [
    { key:'f2', name:'Weakened Angel', stage:'Stage 0', desc:'Faded and weak. Wings dim, power drained.', row:2, col:1,
       effect: (ctx, cw, ch) => { ctx.globalAlpha=0.45; } },
    { key:'f2', name:'Awakened', stage:'Stage 1', desc:'Regaining strength. Wings brightening.', row:2, col:1,
       effect: (ctx, cw, ch) => { ctx.globalAlpha=0.85; } },
    { key:'f1', name:'Guardian', stage:'Stage 2', desc:'Full wings, blue robes, golden halo. Growing confident.', row:2, col:1,
       effect: null },
    { key:'m1', name:'Archangel', stage:'Stage 3', desc:'Golden armor, divine warrior. Sword drawn.', row:2, col:1,
       effect: null },
    { key:'m1', name:'Seraphim', stage:'Stage 4', desc:'Blazing with holy light. Maximum power!', row:2, col:1,
       effect: null,
       postEffect: (ctx, cw, ch) => {
         // 1) Strong golden tint over the sprite
         ctx.globalCompositeOperation='source-atop';
         ctx.fillStyle='rgba(255,215,0,0.35)';
         ctx.fillRect(0,0,cw,ch);
         // Brighten
         ctx.globalCompositeOperation='lighter';
         ctx.fillStyle='rgba(255,230,100,0.18)';
         ctx.fillRect(0,0,cw,ch);
         ctx.globalCompositeOperation='source-over';

         // 2) Large radiating aura behind/around sprite
         const cx2=cw/2, cy2=ch/2;
         const auraGrad = ctx.createRadialGradient(cx2,cy2,20, cx2,cy2,cw*0.7);
         auraGrad.addColorStop(0,'rgba(255,215,0,0.25)');
         auraGrad.addColorStop(0.5,'rgba(255,200,50,0.1)');
         auraGrad.addColorStop(1,'rgba(255,180,0,0)');
         ctx.fillStyle=auraGrad;
         ctx.fillRect(0,0,cw,ch);

         // 3) Glowing border
         ctx.shadowColor='#ffd700'; ctx.shadowBlur=25;
         ctx.strokeStyle='rgba(255,215,0,0.6)'; ctx.lineWidth=3;
         ctx.strokeRect(3,3,cw-6,ch-6);
         ctx.shadowBlur=0;

         // 4) Bright aura particles (scattered, varied sizes)
         const pts = [
           [8,8,5],[cw-12,14,4],[4,ch-25,4],[cw-8,ch-18,5],
           [cw/2-8,3,6],[cw/2+12,ch-8,4],[15,ch/2-10,3],[cw-18,ch/2+5,3],
           [cw/2,8,4],[cw/2-15,ch-12,3],[cw-6,ch/2-20,4],[10,ch/2+15,3],
           [cw/2+20,15,3],[cw/2-20,ch/2,3]
         ];
         pts.forEach(([px,py,sz]) => {
           ctx.shadowColor='#ffd700'; ctx.shadowBlur=sz*3;
           ctx.fillStyle='rgba(255,235,100,0.9)';
           ctx.fillRect(px,py,sz,sz);
         });
         ctx.shadowBlur=0;

         // 5) Light rays from top
         ctx.globalAlpha=0.12;
         ctx.fillStyle='#ffd700';
         ctx.beginPath(); ctx.moveTo(cw/2-5,0); ctx.lineTo(cw/2-20,ch*0.6); ctx.lineTo(cw/2+2,ch*0.6); ctx.closePath(); ctx.fill();
         ctx.beginPath(); ctx.moveTo(cw/2+5,0); ctx.lineTo(cw/2+20,ch*0.6); ctx.lineTo(cw/2-2,ch*0.6); ctx.closePath(); ctx.fill();
         ctx.globalAlpha=1.0;
       }
    },
  ];

  const angelRow = document.getElementById('angel-row');
  stages.forEach((st, i) => {
    if (i > 0) {
      const arrow = document.createElement('div');
      arrow.className = 'arrow'; arrow.textContent = '\u2192';
      angelRow.appendChild(arrow);
    }
    const card = document.createElement('div'); card.className = 'char-card';
    const cw = FW*SC, ch = FH*SC;
    const cv = document.createElement('canvas'); cv.width=cw; cv.height=ch;
    cv.style.width=cw+'px'; cv.style.height=ch+'px';
    const cx = cv.getContext('2d');

    // Apply pre-effect
    if (st.effect) st.effect(cx, cw, ch);
    frame(cx, img[st.key], st.row, st.col, 0, 0, SC);
    cx.globalAlpha = 1.0;

    // Apply post-effect
    if (st.postEffect) st.postEffect(cx, cw, ch);

    card.appendChild(cv);
    const lb = document.createElement('div'); lb.className='label'; lb.textContent=st.name; card.appendChild(lb);
    const sg = document.createElement('div'); sg.className='stage'; sg.textContent=st.stage; card.appendChild(sg);
    const ds = document.createElement('div'); ds.className='desc'; ds.textContent=st.desc; card.appendChild(ds);
    angelRow.appendChild(card);
  });

  // ===== DEVIL BOSS =====
  const devilRow = document.getElementById('devil-row');
  [
    { key:'devil', name:'Devil Queen', stage:'BOSS', desc:'Dark wings, crown of fire, arcane staff. The final challenge.' },
    { key:'violet', name:'Violet Avenger', stage:'ALT BOSS', desc:'Dark sorceress variant. A harder second challenge.' },
  ].forEach(st => {
    const card = document.createElement('div'); card.className='char-card boss-card';
    const cw = FW*SC, ch = FH*SC;
    const cv = document.createElement('canvas'); cv.width=cw; cv.height=ch;
    cv.style.width=cw+'px'; cv.style.height=ch+'px';
    const cx = cv.getContext('2d');
    frame(cx, img[st.key], 0, 1, 0, 0, SC); // SWEN: row 0 = south
    card.appendChild(cv);
    const lb = document.createElement('div'); lb.className='label'; lb.textContent=st.name; card.appendChild(lb);
    const sg = document.createElement('div'); sg.className='stage'; sg.textContent=st.stage; card.appendChild(sg);
    const ds = document.createElement('div'); ds.className='desc'; ds.textContent=st.desc; card.appendChild(ds);
    devilRow.appendChild(card);
  });

  // ===== BATTLE SCENE =====
  const bc = document.getElementById('battle-canvas');
  bc.style.width='700px'; bc.style.height='320px'; bc.style.imageRendering='pixelated';
  const bx = bc.getContext('2d');

  // Background
  const grad = bx.createLinearGradient(0,0,0,220);
  grad.addColorStop(0,'#0a0a1e'); grad.addColorStop(0.5,'#1a0a2e'); grad.addColorStop(1,'#2a1520');
  bx.fillStyle=grad; bx.fillRect(0,0,700,220);
  const gg = bx.createLinearGradient(0,220,0,320);
  gg.addColorStop(0,'#3a1515'); gg.addColorStop(1,'#1a0a0a');
  bx.fillStyle=gg; bx.fillRect(0,220,700,100);

  // Lava
  bx.shadowColor='#ff4400'; bx.shadowBlur=8; bx.fillStyle='#ff4400';
  [[60,238,90,2],[220,248,70,2],[440,242,80,2],[560,252,60,2]].forEach(([x,y,w,h])=>bx.fillRect(x,y,w,h));
  bx.fillStyle='#ff8800';
  [[60,237,90,1],[220,247,70,1],[440,241,80,1],[560,251,60,1]].forEach(([x,y,w,h])=>bx.fillRect(x,y,w,h));
  bx.shadowBlur=0;

  // Stars
  for(let i=0;i<50;i++) {
    bx.fillStyle=`rgba(255,255,255,${Math.random()*0.5+0.5})`;
    bx.fillRect(Math.random()*700|0,Math.random()*200|0,Math.random()>0.8?2:1,Math.random()>0.8?2:1);
  }

  // Angel glow
  bx.shadowColor='#ffd700'; bx.shadowBlur=30;
  bx.fillStyle='rgba(255,215,0,0.05)';
  bx.fillRect(80,60,FW*3,FH*3);
  bx.shadowBlur=0;

  // Archangel facing right (row 1 = East in NESW)
  bx.imageSmoothingEnabled=false;
  frame(bx, img.m1, 1, 1, 100, 70, 3);

  // Devil facing left (row 1 = West in SWEN)
  frame(bx, img.devil, 1, 1, 440, 60, 3);

  // VS
  bx.shadowColor='#ffd700'; bx.shadowBlur=20;
  bx.fillStyle='#ffd700'; bx.font='bold 36px "Segoe UI",sans-serif'; bx.textAlign='center';
  bx.fillText('VS',340,170); bx.shadowBlur=0;

  // HP bars
  bx.fillStyle='#222'; bx.fillRect(70,290,200,18);
  bx.fillStyle='#44cc44'; bx.fillRect(70,290,200,18);
  bx.strokeStyle='#333'; bx.lineWidth=1; bx.strokeRect(70,290,200,18);
  bx.fillStyle='#fff'; bx.font='bold 11px monospace'; bx.textAlign='center';
  bx.fillText('SERAPHIM',170,303);

  bx.fillStyle='#222'; bx.fillRect(430,290,200,18);
  bx.fillStyle='#dd3333'; bx.fillRect(430,290,140,18);
  bx.strokeStyle='#333'; bx.strokeRect(430,290,200,18);
  bx.fillStyle='#fff'; bx.fillText('DEVIL QUEEN',530,303);
}

init();
</script>
